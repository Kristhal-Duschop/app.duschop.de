    <title>Magnetdichtung finden | duschop.de</title>
    <meta name="description" content="Das passende Magnetdichtungs-Set f&uuml;r Ihre Duschkabine finden &mdash; mit Winkel, Glasdicke und Spaltma&szlig;.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>MAGNETDICHTUNG</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.MagnetdichtungData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'magnetdichtung-finder',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('magnetdichtung', D.products); },

            hero: {
                badge: 'In 3 Schritten zum passenden Magnetprofil',
                title: 'Magnetdichtung finden',
                desc: 'Magnetisches Türverschluss-Profil — wir zeigen Ihnen, welches Paar zu Ihrer Glasanordnung und Glasdicke passt.'
            },

            steps: [
                {
                    key: 'angle',
                    shortLabel: 'Anordnung',
                    question: 'Wie stehen Ihre Glasscheiben zueinander?',
                    hint: 'Die Winkel-Anordnung bestimmt, welches Magnetprofil-Paar Sie benötigen.',
                    options: [
                        { value: 90,  label: '90° Ecke',       desc: 'Standard-Eckduschen.',          icon: '┐', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 180, label: '180° Fluchtend', desc: 'Glasscheiben in einer Linie.',  icon: '━━', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 135, label: '135° Fünfeck',   desc: 'Fünfeckduschen mit schrägem Übergang.', icon: '╲╱' }
                    ]
                },
                {
                    key: 'glass',
                    shortLabel: 'Glasdicke',
                    crossTool: true,
                    question: 'Welche Glasdicke hat Ihre Dusche?',
                    hint: 'Messen Sie die Dicke des Glases an einer Kante.',
                    options: [
                        { value: 6,  label: '6 mm', desc: 'Häufig bei Standardduschen.', icon: '◻️', badge: { type: 'standard', text: 'Standard' } },
                        { value: 8,  label: '8 mm', desc: 'Häufig bei rahmenlosen Duschen.', icon: '⬜', badge: { type: 'standard', text: 'Standard' } },
                        { value: 10, label: '10 mm', desc: 'Selten, bei robusten Modellen.', icon: '🔲' }
                    ]
                },
                {
                    key: 'gap',
                    shortLabel: 'Spaltmaß',
                    type: 'slider',
                    question: 'Wie groß ist der Spalt zwischen den Glasscheiben?',
                    hint: 'Messen Sie den Abstand zwischen Tür und Festteil bei geschlossener Tür.',
                    min: 5,
                    max: 35,
                    step: 1,
                    default: 18,
                    unit: 'mm',
                    sliderLabel: 'Spalt zwischen den Glasscheiben',
                    quickPicks: [10, 15, 18, 20, 25],
                    tip: { icon: '📏', type: 'warning', text: '<strong>Wichtig:</strong> Messen Sie den Spalt bei geschlossener Tür. Magnetprofile gibt es in verschiedenen Stärken für unterschiedliche Spaltmaße — der Magnet muss zusammenkommen.' }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, undefined, allProducts);
                matched.sort(function (a, b) {
                    if (a.bestseller && !b.bestseller) return -1;
                    if (!a.bestseller && b.bestseller) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.bestseller) badges.push({ type: 'perfect', text: 'Bestseller' });
                    badges.push({ type: 'match', text: state.angle + '°' });
                    badges.push({ type: 'match', text: 'Glas ' + state.glass + ' mm' });
                    return {
                        product: {
                            title: p.name + (p.artNr ? ' · Art.Nr. ' + p.artNr : ''),
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (p.image ? [{ src: p.image }] : []),
                            variants: [{ price: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zu einer Magnetdichtung.'
            }
        });
    })();
    </script>

</body>
</html>
