<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetdichtung finden | duschop.de</title>
    <meta name="description" content="Das passende Magnetdichtungs-Set f&uuml;r Ihre Duschkabine finden, mit Winkel, Glasdicke und Spaltma&szlig;.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>MAGNETDICHTUNG</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.MagnetdichtungData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'magnetdichtung-finder',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('magnetdichtung', D.products); },

            hero: {
                badge: 'In 3 Schritten zum passenden Magnetprofil',
                title: 'Magnetdichtung finden',
                desc: 'Magnetisches Türverschluss-Profil, wir zeigen Ihnen, welches Paar zu Ihrer Glasanordnung und Glasdicke passt.'
            },

            steps: [
                {
                    key: 'angle',
                    shortLabel: 'Anordnung',
                    question: 'Wie stehen Ihre Glasscheiben zueinander?',
                    hint: 'Die Winkel-Anordnung bestimmt, welches Magnetprofil-Paar Sie benötigen.',
                    options: [
                        { value: 90,  label: '90° Ecke',       desc: 'Standard-Eckduschen.',          icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke-linecap="round" fill="none"><path d="M14 10 L14 31" stroke="#8ba3bb" stroke-width="8"/><path d="M14 31 L36 31" stroke="#8ba3bb" stroke-width="8"/><path d="M14 10 L14 31" stroke="#d8e3ee" stroke-width="5.6"/><path d="M14 31 L36 31" stroke="#d8e3ee" stroke-width="5.6"/></g><circle cx="14" cy="31" r="2.6" fill="#c8956c"/></svg>', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 180, label: '180° Fluchtend', desc: 'Glasscheiben in einer Linie.',  icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="21" width="15" height="6" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="26" y="21" width="15" height="6" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="22" y="20" width="4" height="8" rx="1" fill="#c8956c" stroke="#a87a52" stroke-width="0.7"/></svg>', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 135, label: '135° Fünfeck',   desc: 'Fünfeckduschen mit schrägem Übergang.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke-linecap="round" fill="none"><path d="M9 17 L24 28" stroke="#8ba3bb" stroke-width="8"/><path d="M39 17 L24 28" stroke="#8ba3bb" stroke-width="8"/><path d="M9 17 L24 28" stroke="#d8e3ee" stroke-width="5.6"/><path d="M39 17 L24 28" stroke="#d8e3ee" stroke-width="5.6"/></g><circle cx="24" cy="28" r="2.6" fill="#c8956c"/></svg>' }
                    ]
                },
                {
                    key: 'glass',
                    shortLabel: 'Glasdicke',
                    crossTool: true,
                    question: 'Welche Glasdicke hat Ihre Dusche?',
                    hint: 'Messen Sie die Dicke des Glases an einer Kante.',
                    options: [
                        { value: 6,  label: '6 mm', desc: 'Häufig bei Standardduschen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8956c" stroke-width="1.5" stroke-linecap="round"><line x1="20" y1="6" x2="28" y2="6"/><line x1="20" y1="4" x2="20" y2="8"/><line x1="28" y1="4" x2="28" y2="8"/></g><rect x="20" y="11" width="8" height="30" rx="1" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>', badge: { type: 'standard', text: 'Standard' } },
                        { value: 8,  label: '8 mm', desc: 'Häufig bei rahmenlosen Duschen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8956c" stroke-width="1.5" stroke-linecap="round"><line x1="18.5" y1="6" x2="29.5" y2="6"/><line x1="18.5" y1="4" x2="18.5" y2="8"/><line x1="29.5" y1="4" x2="29.5" y2="8"/></g><rect x="18.5" y="11" width="11" height="30" rx="1" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>', badge: { type: 'standard', text: 'Standard' } },
                        { value: 10, label: '10 mm', desc: 'Selten, bei robusten Modellen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8956c" stroke-width="1.5" stroke-linecap="round"><line x1="17" y1="6" x2="31" y2="6"/><line x1="17" y1="4" x2="17" y2="8"/><line x1="31" y1="4" x2="31" y2="8"/></g><rect x="17" y="11" width="14" height="30" rx="1" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>' }
                    ]
                },
                {
                    key: 'gap',
                    shortLabel: 'Spaltmaß',
                    type: 'slider',
                    question: 'Wie groß ist der Spalt zwischen den Glasscheiben?',
                    hint: 'Messen Sie den Abstand zwischen Tür und Festteil bei geschlossener Tür.',
                    illustration:
                        '<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spaltmaß zwischen Tür und Festteil bei geschlossener Tür">' +
                        '<rect x="92" y="16" width="24" height="80" rx="2" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.2"/><line x1="98" y1="21" x2="98" y2="91" stroke="#f2f7fb" stroke-width="1.6"/>' +
                        '<rect x="184" y="16" width="24" height="80" rx="2" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.2"/><line x1="190" y1="21" x2="190" y2="91" stroke="#f2f7fb" stroke-width="1.6"/>' +
                        '<rect x="116" y="22" width="6" height="68" rx="1.5" fill="#c8956c" stroke="#a87a52" stroke-width="0.7"/><rect x="178" y="22" width="6" height="68" rx="1.5" fill="#c8956c" stroke="#a87a52" stroke-width="0.7"/>' +
                        '<line x1="122" y1="58" x2="178" y2="58" stroke="#c8956c" stroke-width="2"/>' +
                        '<path d="M122 58 L127 55 L127 61 Z" fill="#a87a52"/><path d="M178 58 L173 55 L173 61 Z" fill="#a87a52"/>' +
                        '<text x="150" y="49" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#a87a52">Spaltmaß</text>' +
                        '<text x="104" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9a9a9a">Tür</text>' +
                        '<text x="196" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9a9a9a">Festteil</text>' +
                        '</svg>',
                    min: 5,
                    max: 35,
                    step: 1,
                    default: 18,
                    unit: 'mm',
                    sliderLabel: 'Spalt zwischen den Glasscheiben',
                    quickPicks: [10, 15, 18, 20, 25],
                    tip: { icon: '📏', type: 'warning', text: '<strong>Wichtig:</strong> Messen Sie den Spalt bei geschlossener Tür. Magnetprofile gibt es in verschiedenen Stärken für unterschiedliche Spaltmaße, der Magnet muss zusammenkommen.' }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, undefined, allProducts);
                matched.sort(function (a, b) {
                    if (a.bestseller && !b.bestseller) return -1;
                    if (!a.bestseller && b.bestseller) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.bestseller) badges.push({ type: 'perfect', text: 'Bestseller' });
                    badges.push({ type: 'match', text: state.angle + '°' });
                    badges.push({ type: 'match', text: 'Glas ' + state.glass + ' mm' });
                    return {
                        product: {
                            title: p.name + (p.artNr ? ' · Art.Nr. ' + p.artNr : ''),
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (p.image ? [{ src: p.image }] : []),
                            variants: [{ price: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zu einer Magnetdichtung.'
            }
        });
    })();
    </script>

    <a href="https://wa.me/4917654505183?text=Hallo%2C%20ich%20brauche%20eine%20kurze%20Beratung%20zu%20einer%20Magnetdichtung." class="duschop-wa-sticky" target="_blank" rel="noopener" data-track="whatsapp-magnetdichtung">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.693.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

    <script src="../tracker.js" async></script>
</body>
</html>
