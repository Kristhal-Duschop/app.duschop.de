                },
                {
                    key: 'gap',
                    shortLabel: 'Spaltmaß',

                    shortLabel: 'Türtyp',
                    question: 'Welchen Türtyp haben Sie?',
                    hint: 'Wie öffnet sich Ihre Duschtür?',
                    options: [
                        { value: 'dreh',    label: 'Drehtür / Pendeltür', desc: 'Tür schwingt auf, in eine oder beide Richtungen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="11" width="4" height="28" rx="1" fill="#1a1a2e"/><rect x="12" y="12.5" width="23" height="5" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1" transform="rotate(34 13 15)"/><path d="M35 16 A22 22 0 0 1 19 36" fill="none" stroke="#c8956c" stroke-width="1.4" stroke-dasharray="2.5 2.5" stroke-linecap="round"/></svg>', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 'schiebe', label: 'Schiebetür',           desc: 'Tür gleitet seitlich auf.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="17" width="26" height="5" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="15" y="24" width="26" height="5" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><g stroke="#c8956c" stroke-width="1.6" stroke-linecap="round" fill="none"><line x1="18" y1="37" x2="33" y2="37"/><path d="M29 34 L33 37 L29 40"/></g></svg>' }
                    ]
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, undefined, allProducts);
                matched.sort(function (a, b) {
                    if (a.bestseller && !b.bestseller) return -1;
                    if (!a.bestseller && b.bestseller) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.bestseller) badges.push({ type: 'perfect', text: 'Bestseller' });
                    badges.push({ type: 'match', text: 'Glas ' + state.glass + ' mm' });
                    if (p.gapMin != null && p.gapMax != null) badges.push({ text: p.gapMin + '–' + p.gapMax + ' mm Spalt' });
                    return {
                        product: {
                            title: p.name + (p.artNr ? ' · Art.Nr. ' + p.artNr : ''),
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (p.image ? [{ src: p.image }] : []),
                            variants: [{ price: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zu einer unteren Duschdichtung.'
            }
