<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metallprofile-Konfigurator | duschop.de</title>
    <meta name="description" content="Das passende Wand- oder Bodenprofil f&uuml;r Ihre Glasdusche &mdash; Material, Einbauart, Oberfl&auml;che und Glasbefestigung in 4 Schritten festlegen.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>
        html, body { margin: 0; padding: 0; }
        body { background: var(--duschop-bg, #f8f6f3); }
    </style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>METALLPROFILE-KONFIGURATOR</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.MetallprofileData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'metallprofile-konfigurator',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('metallprofile-duschglas', D.products); },

            hero: {
                badge: 'In 4 Schritten zum richtigen Profil',
                title: 'Metallprofile-Konfigurator',
                desc: 'Wand- oder Bodenprofil für Ihre Glasdusche — wir zeigen Ihnen, welches Material, welche Einbauart und welche Befestigung zu Ihrem Projekt passt.'
            },

            steps: [
                // ---- 1. Material ----
                {
                    key: 'material',
                    shortLabel: 'Material',
                    question: 'Aus welchem Material soll das Profil sein?',
                    hint: 'Beide Materialien sind feuchtraumgeeignet. Aluminium ist günstiger und farbenfroher, Edelstahl ist robuster.',
                    options: [
                        {
                            value: 'alu',
                            label: 'Aluminium',
                            desc: 'Leichtes, eloxiertes Profil. Große Farbauswahl. Preisgünstiger.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="8" y="6" width="24" height="28" rx="3" fill="#e0e0e0" stroke="#b0b0b0" stroke-width="2"/><text x="20" y="24" text-anchor="middle" font-size="9" fill="#777" font-weight="700">ALU</text></svg>',
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'edelstahl',
                            label: 'Edelstahl V2A',
                            desc: 'Massiv, korrosionsbeständig. Premium-Qualität, langlebig.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="8" y="6" width="24" height="28" rx="3" fill="#c8c4be" stroke="#999" stroke-width="2"/><text x="20" y="24" text-anchor="middle" font-size="7" fill="#666" font-weight="700">V2A</text></svg>',
                            badge: { type: 'trend', text: 'Premium' }
                        }
                    ]
                },

                // ---- 2. Einbauart ----
                {
                    key: 'einbau',
                    shortLabel: 'Einbauart',
                    question: 'Wie wird das Profil eingebaut?',
                    hint: 'In Fliesenebene = bündig, wird beim Fliesenlegen eingebettet. Auf Fliese = nachträglich aufgesetzt.',
                    optionsFn: function (state, allProducts) {
                        var pool = (allProducts || D.products).filter(function (p) { return p.material === state.material; });
                        var einbauSet = {};
                        pool.forEach(function (p) { if (p.einbau) einbauSet[p.einbau] = true; });
                        return Object.keys(einbauSet).map(function (id) {
                            var def = D.einbauDefs[id];
                            if (!def) return null;
                            var count = pool.filter(function (p) { return p.einbau === id; }).length;
                            return {
                                value: id,
                                label: def.name,
                                desc: def.desc + (count ? ' (' + count + ' Profil' + (count !== 1 ? 'e' : '') + ')' : '')
                            };
                        }).filter(Boolean);
                    },
                    tip: {
                        icon: '🧱',
                        type: 'info',
                        text: '<strong>Wichtig:</strong> <em>In Fliesenebene</em> muss vor dem Fliesenlegen montiert werden. Für eine Renovierung wählen Sie <em>auf Fliese</em>.'
                    }
                },

                // ---- 3. Oberfläche ----
                {
                    key: 'color',
                    shortLabel: 'Oberfläche',
                    question: 'Welche Oberfläche soll es sein?',
                    hint: 'Nur die Oberflächen, die für Ihre bisherige Auswahl lieferbar sind.',
                    crossTool: true,
                    optionSize: 'small',
                    optionsFn: function (state, allProducts) {
                        var pool = (allProducts || D.products).filter(function (p) {
                            return p.material === state.material && p.einbau === state.einbau;
                        });
                        var set = {};
                        pool.forEach(function (p) { (p.colors || []).forEach(function (c) { set[c] = true; }); });
                        return Object.keys(set).map(function (id) {
                            var def = D.colorDefs[id];
                            if (!def) return null;
                            return { value: id, label: def.name, desc: def.finish, swatch: def.gradient };
                        }).filter(Boolean);
                    }
                },

                // ---- 4. Abschlussart ----
                {
                    key: 'abschluss',
                    shortLabel: 'Abschluss',
                    question: 'Wie soll das Glas im Profil befestigt werden?',
                    hint: 'Silikonverklebung ist Standard. Kunststoff-Einlage ist abnehmbar. Klemmprofil ohne Bohren.',
                    optionsFn: function (state, allProducts) {
                        var pool = (allProducts || D.products).filter(function (p) {
                            return p.material === state.material && p.einbau === state.einbau
                                && (!state.color || (p.colors && p.colors.indexOf(state.color) !== -1));
                        });
                        var set = {};
                        pool.forEach(function (p) { (p.abschluss || []).forEach(function (a) { set[a] = true; }); });
                        return Object.keys(set).map(function (id) {
                            var def = D.abschlussDefs[id];
                            if (!def) return null;
                            return { value: id, label: def.name, desc: def.desc };
                        }).filter(Boolean);
                    },
                    tip: {
                        icon: '💡',
                        type: 'info',
                        text: '<strong>Kunststoff-Einlage</strong> ist später wieder zu öffnen — gut für Reparaturen. <strong>Silikon</strong> ist die dichteste Verbindung. <strong>Klemmprofil</strong> ist die saubere Lösung ohne Bohrungen.'
                    }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, allProducts);
                matched.sort(function (a, b) {
                    if (a.isMain && !b.isMain) return -1;
                    if (!a.isMain && b.isMain) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.isMain) badges.push({ type: 'perfect', text: 'Empfohlen' });
                    if (state.color && p.colors && p.colors.indexOf(state.color) !== -1) {
                        badges.push({ type: 'match', text: 'In Wunschfarbe' });
                    }
                    return {
                        product: {
                            title: p.title,
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (D.productImages[p.handle] ? [{ src: D.productImages[p.handle] }] : []),
                            variants: [{ price: p.price }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.price,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich habe den Metallprofile-Konfigurator genutzt und bräuchte eine kurze Beratung.'
            }
        });
    })();
    </script>

        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

    <script src="../tracker.js" async></script>
</body>
</html>
