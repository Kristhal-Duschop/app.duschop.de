    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.ZubehoerData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'duschzubehoer-finder',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('dusche_accessoire', D.products); },

            hero: {
                badge: 'In bis zu 2 Schritten zum passenden Zubehör',
                title: 'Duschzubehör-Finder',
                desc: 'Körbe, Halter, Haken, Brausen, Hocker, Vorhänge — wir zeigen Ihnen, was zu Ihrer Dusche passt.'
            },

            steps: [
                {
                    key: 'kategorie',
                    shortLabel: 'Kategorie',
                    question: 'Was suchen Sie für Ihre Dusche?',
                    hint: 'Wählen Sie die Produktkategorie — wir zeigen Ihnen die passenden Produkte.',
                    options: [
                        { value: 'koerbe',     label: 'Duschkörbe & Ablagen', desc: 'Seifenkörbe, Schwammkörbe, Eckkörbe und Duschregale.',                            icon: '🧺', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 'halter',     label: 'Handtuchhalter',        desc: 'Handtuchhalter, -stangen und -ringe für Glasdusche, Wand und Heizkörper.',         icon: '🪝' },
                        { value: 'haken',      label: 'Haken & Halter',         desc: 'Duschhaken, Hakenleisten und Halter zum Einhängen an der Glaswand.',               icon: '🪝' },
                        { value: 'brausen',    label: 'Brausen & Armaturen',   desc: 'Kopfbrausen, Handbrausen, Brausestangen, Thermostate und Brausesets.',             icon: '🚿' },
                        { value: 'hocker',     label: 'Duschhocker',            desc: 'Komfortable Hocker aus Aluminium oder Plexiglas — rutschfest und stilvoll.',     icon: '🪑' },
                        { value: 'vorhang',    label: 'Duschvorhänge & Stangen', desc: 'Vorhangstangen aus Edelstahl/Alu, Textil-Duschvorhänge und Zubehör.',         icon: '🎭' },
                        { value: 'wannen',     label: 'Duschwannen & Abläufe', desc: 'Acryl-Duschwannen in verschiedenen Größen und flache Abläufe.',                  icon: '🛁' },
                        { value: 'badzubehoer', label: 'Bad- & WC-Zubehör',     desc: 'Seifenspender, Kosmetikspiegel, Zahnputzbecher, WC-Bürsten, Duschabzieher.', icon: '🪥' }
                    ]
                },
                {
                    key: 'montage',
                    shortLabel: 'Montage',
                    questionFn: function (state) {
                        var cfg = D.montageConfig[state.kategorie];
                        return cfg ? cfg.title : 'Wie soll das Zubehör befestigt werden?';
                    },
                    hintFn: function (state) {
                        var cfg = D.montageConfig[state.kategorie];
                        return cfg ? cfg.subtitle : '';
                    },
                    skipFn: function (state) {
                        // Bei Kategorien ohne Montage-Wahl überspringen
                        return D.skipMontageCategories.indexOf(state.kategorie) !== -1;
                    },
                    optionsFn: function (state, allProducts) {
                        var cfg = D.montageConfig[state.kategorie];
                        if (!cfg) return [];
                        return cfg.options.map(function (opt) {
                            var count = D.filterProducts({ kategorie: state.kategorie, montage: opt.value }, allProducts).length;
                            return {
                                value: opt.value,
                                label: opt.name,
                                desc: opt.desc + (count ? ' (' + count + ' Produkt' + (count !== 1 ? 'e' : '') + ')' : ''),
                                icon: opt.icon
                            };
                        });
                    }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, allProducts);
                matched.sort(function (a, b) {
                    if (a.highlight && !b.highlight) return -1;
                    if (!a.highlight && b.highlight) return 1;
                    if (a.isMain && !b.isMain) return -1;
                    if (!a.isMain && b.isMain) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.highlight) badges.push({ type: 'perfect', text: 'Top-Empfehlung' });
                    else if (p.isMain) badges.push({ type: 'match', text: 'Empfohlen' });
                    return {
                        product: {
                            title: p.title,
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (D.productImages[p.handle] ? [{ src: D.productImages[p.handle] }] : []),
                            variants: [{ price: p.price }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.price,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich habe den Duschzubehör-Finder genutzt und bräuchte eine kurze Beratung.'
            }
        });
    })();
    </script>
