<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabistangen-Konfigurator | duschop.de</title>
    <meta name="description" content="Die passende Stabilisierungsstange f&uuml;r Ihre Glasdusche &mdash; Montage, Form und Oberfl&auml;che frei w&auml;hlbar. Schritt-f&uuml;r-Schritt-Berater.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>
        html, body { margin: 0; padding: 0; }
        body { background: var(--duschop-bg, #f8f6f3); }
    </style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>STABISTANGEN-KONFIGURATOR</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.StabistangenData;

        // Caches die zuletzt von fetchAll gelieferten Produkte, damit die match()-Funktion
        // sie direkt nutzen kann (allProducts wird vom Wizard via fetchProducts gefüllt).
        var allProducts = [];

        // SVG-Icons für die Formen
        var formIcons = {
            'circle':     '<svg width="32" height="32" viewBox="0 0 40 40"><circle cx="20" cy="20" r="8" fill="none" stroke="#c8956c" stroke-width="2.5"/><text x="20" y="24" text-anchor="middle" font-size="8" fill="#c8956c" font-weight="600">12</text></svg>',
            'circle-big': '<svg width="32" height="32" viewBox="0 0 40 40"><circle cx="20" cy="20" r="12" fill="none" stroke="#c8956c" stroke-width="2.5"/><text x="20" y="24" text-anchor="middle" font-size="8" fill="#c8956c" font-weight="600">19</text></svg>',
            'square':     '<svg width="32" height="32" viewBox="0 0 40 40"><rect x="12" y="12" width="16" height="16" rx="2" fill="none" stroke="#c8956c" stroke-width="2.5"/><text x="20" y="24" text-anchor="middle" font-size="7" fill="#c8956c" font-weight="600">12</text></svg>',
            'square-big': '<svg width="32" height="32" viewBox="0 0 40 40"><rect x="8" y="8" width="24" height="24" rx="2" fill="none" stroke="#c8956c" stroke-width="2.5"/><text x="20" y="24" text-anchor="middle" font-size="7" fill="#c8956c" font-weight="600">20</text></svg>'
        };

        // Montage-Icons
        var montageIcons = {
            'wand-glas':  '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="2" y="4" width="6" height="32" rx="1" fill="#e8e4df" stroke="#999"/><rect x="28" y="4" width="6" height="32" rx="1" fill="#d4eeff" stroke="#7ab8e0" stroke-dasharray="4 2"/><line x1="8" y1="20" x2="28" y2="20" stroke="#c8956c" stroke-width="3" stroke-linecap="round"/><circle cx="8" cy="20" r="3" fill="#c8956c"/><circle cx="28" cy="20" r="3" fill="#c8956c"/></svg>',
            'glas-glas':  '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="2" y="4" width="6" height="32" rx="1" fill="#d4eeff" stroke="#7ab8e0" stroke-width="2" stroke-dasharray="4 2"/><rect x="28" y="4" width="6" height="32" rx="1" fill="#d4eeff" stroke="#7ab8e0" stroke-width="2" stroke-dasharray="4 2"/><line x1="8" y1="20" x2="28" y2="20" stroke="#c8956c" stroke-width="3" stroke-linecap="round"/><circle cx="8" cy="20" r="3" fill="#c8956c"/><circle cx="28" cy="20" r="3" fill="#c8956c"/></svg>',
            'glas-decke': '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><line x1="4" y1="4" x2="36" y2="4" stroke="#999" stroke-width="3" stroke-linecap="round"/><rect x="14" y="22" width="6" height="18" rx="1" fill="#d4eeff" stroke="#7ab8e0" stroke-width="2" stroke-dasharray="4 2"/><line x1="17" y1="4" x2="17" y2="22" stroke="#c8956c" stroke-width="3" stroke-linecap="round"/><circle cx="17" cy="4" r="3" fill="#c8956c"/><circle cx="17" cy="22" r="3" fill="#c8956c"/></svg>'
        };

        // ---- Filter-Funktionen ----
        function filterByMontage(montage) {
            return allProducts.filter(function (p) {
                return p.montage && p.montage.indexOf(montage) !== -1;
            });
        }
        function filterByMontageForm(montage, form) {
            return allProducts.filter(function (p) {
                return p.montage && p.montage.indexOf(montage) !== -1 && p.form === form;
            });
        }
        function filterByAll(state) {
            return allProducts.filter(function (p) {
                if (state.montage && (!p.montage || p.montage.indexOf(state.montage) === -1)) return false;
                if (state.form && p.form !== state.form) return false;
                if (state.color && (!p.colors || p.colors.indexOf(state.color) === -1)) return false;
                return true;
            });
        }

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'stabistangen-konfigurator',

            fetchProducts: function () {
                return D.fetchAll().then(function (data) {
                    allProducts = data.products || [];
                    return allProducts;
                });
            },

            hero: {
                badge: 'In 3 Schritten zur richtigen Stange',
                title: 'Stabistangen-Konfigurator',
                desc: 'Stabilisierungsstange für Ihre Glasdusche — wir zeigen Ihnen, welches Profil, welche Montage und welche Oberfläche zu Ihrer Situation passt.'
            },

            steps: [
                // ---- Schritt 1: Montage ----
                {
                    key: 'montage',
                    shortLabel: 'Montage',
                    question: 'Wie soll die Stange montiert werden?',
                    hint: 'Wählen Sie, zwischen welchen Punkten die Stabilisierungsstange befestigt wird.',
                    options: [
                        {
                            value: 'wand-glas',
                            label: 'Wand – Glas',
                            desc: 'Die häufigste Montageart. Stange zwischen Wand und Glasscheibe.',
                            icon: montageIcons['wand-glas'],
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'glas-glas',
                            label: 'Glas – Glas',
                            desc: 'Für Eckduschen. Stange verbindet zwei Glasscheiben.',
                            icon: montageIcons['glas-glas']
                        },
                        {
                            value: 'glas-decke',
                            label: 'Glas – Decke',
                            desc: 'Vertikal. Ideal bei hohen Räumen oder Walk-in-Duschen.',
                            icon: montageIcons['glas-decke']
                        }
                    ],
                    tip: {
                        icon: '💡',
                        type: 'info',
                        text: '<strong>Tipp:</strong> Bei Standardduschen mit fester Rückwand ist <em>Wand – Glas</em> richtig. Bei Walk-in oder freistehenden Glaswänden brauchen Sie eine Stange <em>zur Decke</em> oder einen <em>Wandwinkel ohne Glasbohrung</em>.'
                    }
                },

                // ---- Schritt 2: Form (dynamisch je nach Montage) ----
                {
                    key: 'form',
                    shortLabel: 'Form',
                    question: 'Welche Stangenform bevorzugen Sie?',
                    hint: 'Es werden nur Profile angezeigt, die für Ihre gewählte Montage tatsächlich lieferbar sind.',
                    optionsFn: function (state) {
                        if (!state.montage || !allProducts.length) return [];
                        var avail = {};
                        filterByMontage(state.montage).forEach(function (p) {
                            if (p.form) avail[p.form] = true;
                        });
                        var formIds = Object.keys(avail);
                        // Sortierung: rund-12, rund-19, eckig-12, eckig-20
                        var order = { 'rund-12': 1, 'rund-19': 2, 'eckig-12': 3, 'eckig-20': 4 };
                        formIds.sort(function (a, b) { return (order[a] || 99) - (order[b] || 99); });
                        return formIds.map(function (id) {
                            var def = D.formDefs[id];
                            if (!def) return null;
                            var count = filterByMontageForm(state.montage, id).length;
                            return {
                                value: id,
                                label: def.name,
                                desc: def.desc + (count ? ' (' + count + ' Produkt' + (count !== 1 ? 'e' : '') + ')' : ''),
                                icon: formIcons[def.icon] || ''
                            };
                        }).filter(Boolean);
                    }
                },

                // ---- Schritt 3: Oberfläche ----
                {
                    key: 'color',
                    shortLabel: 'Oberfläche',
                    question: 'Welche Oberfläche soll es sein?',
                    hint: 'Nur Oberflächen, die für Ihre Auswahl tatsächlich lieferbar sind.',
                    crossTool: true,
                    optionSize: 'small',
                    optionsFn: function (state) {
                        if (!state.form || !allProducts.length) return [];
                        var set = {};
                        filterByMontageForm(state.montage, state.form).forEach(function (p) {
                            (p.colors || []).forEach(function (c) { set[c] = true; });
                        });
                        return Object.keys(set).map(function (id) {
                            var def = D.colorDefs[id];
                            if (!def) return null;
                            return {
                                value: id,
                                label: def.name,
                                desc: def.finish,
                                swatch: def.gradient
                            };
                        }).filter(Boolean);
                    }
                }
            ],

            match: function (state) {
                var matched = filterByAll(state);
                // Sortierung: Sets zuerst (die sind die "Beste Wahl"), dann Einzel-Komponenten
                matched.sort(function (a, b) {
                    if (a.isSet && !b.isSet) return -1;
                    if (!a.isSet && b.isSet) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.isSet) badges.push({ type: 'perfect', text: 'Komplett-Set' });
                    else badges.push({ text: p.type ? p.type.charAt(0).toUpperCase() + p.type.slice(1) : 'Einzelteil' });
                    if (state.color && p.colors && p.colors.indexOf(state.color) !== -1) {
                        badges.push({ type: 'match', text: 'In Wunschfarbe' });
                    }
                    var img = D.getImageFor(p.handle);
                    return {
                        product: {
                            title: p.title,
                            handle: p.handle,
                            images: img ? [{ src: img }] : [],
                            variants: [{ price: p.price }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.price,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich habe den Stabistangen-Konfigurator genutzt und bräuchte eine kurze Beratung.'
            }
        });
    })();
    </script>

        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

    <script src="../tracker.js" async></script>
</body>
