<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beschl&auml;ge-Finder | duschop.de</title>
    <meta name="description" content="Finden Sie das passende Scharnier, den richtigen Haltewinkel, T&uuml;rgriff oder die ideale Griffmuschel f&uuml;r Ihre Glasdusche. Schritt-f&uuml;r-Schritt-Beratung.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>
        /* Reset speziell fuer Standalone-Page (gilt nur ausserhalb des Wizards) */
        html, body { margin: 0; padding: 0; }
        body { background: var(--duschop-bg, #f8f6f3); }
    </style>
</head>
<body>

    <!-- ============================================================
         Tool-Header (Marken-Header, kein Wizard-Inhalt)
         ============================================================ -->
    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>BESCHL&Auml;GE-FINDER</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <!-- ============================================================
         Wizard-Container (von duschop.js befuellt)
         ============================================================ -->
    <div id="duschop-app"></div>

    <!-- ============================================================
         Daten + Wizard-Logik
         ============================================================ -->
    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.BeschlaegeData;

        // ========================================================
        // Annotations-Lookup (handle -> Klassifizierung aus data.js)
        // ========================================================
        var ANNOTATIONS = {};
        D.products.forEach(function (p) {
            ANNOTATIONS[p.handle] = p;
        });

        // ========================================================
        // Live-Produkt + Annotation -> arbeitsfähiges Objekt
        // Live bringt: title, handle, images, variants.
        // Annotation bringt: kategorie, subtyp-Felder, glasdicken, colors, desc, serie, hebeSenk
        // ========================================================
        function annotate(liveProduct) {
            var ann = ANNOTATIONS[liveProduct.handle];
            if (!ann) return null; // kein Match in Annotations -> ueberspringen
            // Live-Preis aus erster Variante (oder priceMin aus presentment)
            var livePrice = (liveProduct.variants && liveProduct.variants[0])
                ? liveProduct.variants[0].price
                : ann.price;
            return {
                live: liveProduct,
                kategorie: ann.kategorie,
                montage: ann.montage,
                typ: ann.typ,
                grifftyp: ann.grifftyp,
                befestigung: ann.befestigung,
                form: ann.form,
                hebeSenk: ann.hebeSenk,
                glasdicken: ann.glasdicken,
                tragkraft: ann.tragkraft,
                colors: ann.colors || [],
                desc: ann.desc,
                serie: ann.serie,
                price: livePrice,
                priceMax: ann.priceMax
            };
        }

        // Live-Fetch + Annotation-Join. Faellt auf statische data.js zurueck,
        // wenn der Live-Fetch leer ist oder fehlschlaegt.
        function fetchProductsLive() {
            return DuschopShopifyClient.fetchCollection('beschlagsteile-und-scharniere-fur-duschabtrennungen-aus-glas')
                .then(function (live) {
                    if (!live || live.length === 0) {
                        // Fallback: statische data.js durchgaengig benutzen
                        return D.products.map(function (p) {
                            return annotateFromStatic(p);
                        });
                    }
                    var annotated = [];
                    live.forEach(function (lp) {
                        var a = annotate(lp);
                        if (a) annotated.push(a);
                    });
                    // Wenn Live-Bestand kleiner als Annotations-Tabelle ist:
                    // Annotations ohne Live-Match als Fallback hinzufuegen,
                    // damit der Wizard nicht "leer" wirkt
                    var seen = {};
                    annotated.forEach(function (a) { seen[a.live.handle] = true; });
                    D.products.forEach(function (p) {
                        if (!seen[p.handle]) annotated.push(annotateFromStatic(p));
                    });
                    return annotated;
                })
                .catch(function () {
                    return D.products.map(function (p) { return annotateFromStatic(p); });
                });
        }

        function annotateFromStatic(p) {
            return {
                live: {
                    title: p.title,
                    handle: p.handle,
                    images: [],
                    variants: [{ price: p.price }]
                },
                kategorie: p.kategorie,
                montage: p.montage,
                typ: p.typ,
                grifftyp: p.grifftyp,
                befestigung: p.befestigung,
                form: p.form,
                hebeSenk: p.hebeSenk,
                glasdicken: p.glasdicken,
                tragkraft: p.tragkraft,
                colors: p.colors || [],
                desc: p.desc,
                serie: p.serie,
                price: p.price,
                priceMax: p.priceMax
            };
        }

        // ========================================================
        // Filter-Logik auf annotated objects
        // ========================================================
        function filterAnnotated(annotated, state) {
            return annotated.filter(function (a) {
                if (state.kategorie && a.kategorie !== state.kategorie) return false;
                if (state.subtyp) {
                    if (state.kategorie === 'scharnier' || state.kategorie === 'haltewinkel') {
                        if (a.montage !== state.subtyp) return false;
                    } else if (state.kategorie === 'griff') {
                        if (a.grifftyp !== state.subtyp) return false;
                    } else if (state.kategorie === 'griffmuschel') {
                        if (a.befestigung !== state.subtyp) return false;
                    }
                }
                if (state.color && a.colors && a.colors.indexOf(state.color) === -1) return false;
                return true;
            });
        }

        function availableColorsFromList(annotated, state) {
            var filtered = filterAnnotated(annotated, { kategorie: state.kategorie, subtyp: state.subtyp });
            var set = {};
            filtered.forEach(function (a) {
                (a.colors || []).forEach(function (c) { set[c] = true; });
            });
            return Object.keys(set);
        }

        function matchToWizardItems(state, annotated) {
            var filtered = filterAnnotated(annotated, state);
            return filtered.map(function (a, idx) {
                var badges = [];
                if (state.color) badges.push({ type: 'perfect', text: 'Oberfläche lieferbar' });
                if (a.hebeSenk) badges.push({ type: 'match', text: 'Hebe-Senk-Funktion' });
                if (a.glasdicken) badges.push({ text: a.glasdicken });
                return {
                    product: a.live,
                    matchReason: a.desc,
                    badges: badges,
                    priceOverride: a.price,
                    position: idx
                };
            });
        }

        // ============================================================
        // Wizard-Konfiguration
        // ============================================================
        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'beschlaege-finder',

            // Live-Shopify-Fetch (Phase 4) mit Annotation-Join + Static-Fallback.
            fetchProducts: function () {
                return fetchProductsLive();
            },

            hero: {
                badge: 'In 3 Schritten zum passenden Beschlag',
                title: 'Beschläge-Finder',
                desc: 'Scharnier, Haltewinkel, Türgriff oder Griffmuschel — wir zeigen Ihnen, was für Ihre Glasdusche passt und in welcher Oberfläche es lieferbar ist.'
            },

            steps: [
                // ---- Schritt 1: Produktart ----
                {
                    key: 'kategorie',
                    shortLabel: 'Produktart',
                    question: 'Was für einen Beschlag suchen Sie?',
                    hint: 'Wählen Sie die Kategorie, die am besten zu Ihrem Vorhaben passt.',
                    options: [
                        {
                            value: 'scharnier',
                            label: 'Scharnier / Duschband',
                            desc: 'Pendeltürbänder und Anschlagbänder für Dusch-Drehtueren.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="4" y="6" width="12" height="28" rx="2"/><rect x="24" y="6" width="12" height="28" rx="2" stroke-dasharray="4 2"/><circle cx="20" cy="14" r="3" fill="#c8956c"/><circle cx="20" cy="26" r="3" fill="#c8956c"/></svg>',
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'griff',
                            label: 'Türgriff / Knopf',
                            desc: 'Griffe, Knöpfe und Stangengriffe für Glasduschtüren.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="16" y="4" width="8" height="32" rx="4"/><line x1="12" y1="12" x2="28" y2="12" stroke-width="2"/><line x1="12" y1="28" x2="28" y2="28" stroke-width="2"/></svg>',
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'haltewinkel',
                            label: 'Haltewinkel',
                            desc: '90°-Winkelverbinder für feste Glasscheiben.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><path d="M8 8 L8 32 L32 32"/><rect x="4" y="4" width="8" height="8" rx="1" fill="rgba(200,149,108,0.2)"/><rect x="28" y="28" width="8" height="8" rx="1" fill="rgba(200,149,108,0.2)" stroke-dasharray="4 2"/></svg>'
                        },
                        {
                            value: 'griffmuschel',
                            label: 'Griffmuschel',
                            desc: 'Flache Muschelgriffe zum Verschrauben oder Aufkleben.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><ellipse cx="20" cy="20" rx="12" ry="8"/><path d="M12 20 Q20 28 28 20" fill="rgba(200,149,108,0.15)"/></svg>'
                        }
                    ],
                    tip: {
                        icon: '💡',
                        type: 'info',
                        text: '<strong>Unsicher?</strong> Bei Drehtüren brauchen Sie ein <em>Scharnier</em>. Bei Schiebe- oder Festteilen reicht meist eine <em>Griffmuschel</em>. Stangengriffe sind <em>Türgriffe</em>.'
                    }
                },

                // ---- Schritt 2: Untertyp (kontextabhängig) ----
                {
                    key: 'subtyp',
                    shortLabel: 'Variante',
                    questionFn: function (state) {
                        var def = D.step1Defs[state.kategorie];
                        return def ? def.title : 'Welche Variante?';
                    },
                    hintFn: function (state) {
                        var def = D.step1Defs[state.kategorie];
                        return def ? def.subtitle : '';
                    },
                    optionsFn: function (state, annotated) {
                        var def = D.step1Defs[state.kategorie];
                        if (!def) return [];
                        return def.options.map(function (opt) {
                            var count = filterAnnotated(annotated || [], { kategorie: state.kategorie, subtyp: opt.value }).length;
                            return {
                                value: opt.value,
                                label: opt.name,
                                desc: opt.desc + (count ? ' (' + count + ' Produkt' + (count !== 1 ? 'e' : '') + ')' : ''),
                                icon: opt.icon
                            };
                        });
                    }
                },

                // ---- Schritt 3: Oberfläche/Farbe ----
                {
                    key: 'color',
                    shortLabel: 'Oberfläche',
                    question: 'Welche Oberfläche bevorzugen Sie?',
                    hint: 'Es werden nur die Oberflächen angezeigt, die für Ihre bisherige Auswahl tatsächlich lieferbar sind.',
                    crossTool: true,
                    optionSize: 'small',
                    optionsFn: function (state, annotated) {
                        var avail = availableColorsFromList(annotated || [], state);
                        return avail.map(function (id) {
                            var def = D.colorDefs[id];
                            if (!def) return null;
                            return {
                                value: id,
                                label: def.name,
                                desc: def.finish,
                                swatch: def.gradient
                            };
                        }).filter(Boolean);
                    }
                }
            ],

            match: function (state, annotated) {
                return matchToWizardItems(state, annotated || []);
            },

            conversion: {
                whatsappText: 'Hallo, ich habe den Beschläge-Finder genutzt und bräuchte eine kurze Beratung.'
            }
        });
    })();
    </script>

        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

    <!-- Duschop Tracker (Pageview + Generic Click-Tracking) -->
    <script src="../tracker.js" async></script>
</body>
