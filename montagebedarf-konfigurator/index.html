<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montagebedarf-Finder | duschop.de</title>
    <meta name="description" content="Das passende Montagematerial f&uuml;r Ihre Glasdusche, Duschwanne, Nassbereich oder Fugen finden, D&uuml;bel, Schrauben, Kleber, Silikon oder Abdichtung in 2 Schritten.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>MONTAGEBEDARF-FINDER</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.MontageData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'montagebedarf-finder',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('montagematerial_dusche', D.products); },

            hero: {
                badge: 'In 2 Schritten zum passenden Material',
                title: 'Montagebedarf-Finder',
                desc: 'Dübel, Schrauben, Silikon, Kleber, Dichtbänder, wir zeigen Ihnen, was Sie für Ihr Bauprojekt brauchen.'
            },

            steps: [
                {
                    key: 'vorhaben',
                    shortLabel: 'Vorhaben',
                    question: 'Was steht bei Ihnen an?',
                    hint: 'Wählen Sie Ihr Projekt, wir empfehlen das passende Material.',
                    options: [
                        {
                            value: 'glasdusche',
                            label: 'Glasdusche montieren',
                            desc: 'Duschabtrennung, Duschkabine oder Glaswand befestigen.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="18" height="32" rx="1" fill="none"/><path d="M24 12L34 12L34 36L6 36"/><circle cx="22" cy="20" r="1.5" fill="#c8956c"/></svg>',
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'duschwanne',
                            label: 'Duschwanne abdichten',
                            desc: 'Duschwanne oder Duschrinne einbauen, Wandanschluss normgerecht abdichten.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 28L36 28"/><path d="M6 28L6 32C6 34 8 36 10 36L30 36C32 36 34 34 34 32L34 28"/><path d="M8 28L8 20C8 18 10 16 12 16L28 16C30 16 32 18 32 20L32 28"/></svg>'
                        },
                        {
                            value: 'nassbereich',
                            label: 'Nassbereich abdichten',
                            desc: 'Wand und Boden unter Fliesen wasserdicht machen (DIN 18534).',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="28" height="28" rx="2" fill="none"/><path d="M16 10L20 6L24 10" stroke="#c8956c" stroke-width="2" fill="none"/><path d="M20 6L20 20"/><circle cx="20" cy="24" r="2" fill="#c8956c" opacity="0.4"/></svg>'
                        },
                        {
                            value: 'fugen',
                            label: 'Silikonfugen erneuern',
                            desc: 'Alte Silikonfugen ersetzen oder Anschlussprofile anbringen.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="14" height="32" rx="1" fill="none"/><rect x="22" y="4" width="14" height="32" rx="1" fill="none"/><path d="M19 6L21 6L21 34L19 34Z" fill="#c8956c" opacity="0.15"/></svg>'
                        }
                    ],
                    tip: {
                        icon: '💡',
                        type: 'info',
                        text: '<strong>Tipp:</strong> Für eine komplette Duschmontage brauchen Sie oft Material aus mehreren Bereichen. Starten Sie einfach mehrere Durchläufe, um alles zusammenzustellen.'
                    }
                },
                {
                    key: 'befestigung',
                    shortLabel: 'Befestigung',
                    question: 'Wie möchten Sie befestigen?',
                    hint: 'Die Befestigungsart bestimmt, welches Montagematerial Sie brauchen.',
                    options: [
                        {
                            value: 'bohren',
                            label: 'Bohren',
                            desc: 'Klassisch mit Dübel und Schraube. Maximaler Halt für schwere Glaselemente.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 32L18 22"/><path d="M18 22L28 12"/><path d="M28 12L32 8"/><circle cx="32" cy="8" r="3" fill="none"/><path d="M14 26L10 30"/></svg>',
                            badge: { type: 'standard', text: 'Standard' }
                        },
                        {
                            value: 'kleben',
                            label: 'Kleben',
                            desc: 'Bohrfrei. MS-Polymer Kleber oder Klebeband. Keine Löcher in den Fliesen.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8L12 26C12 28 14 30 16 30L24 30C26 30 28 28 28 26L28 8"/><path d="M12 8L28 8"/><path d="M18 30L18 36"/><path d="M22 30L22 36"/></svg>'
                        },
                        {
                            value: 'beides',
                            label: 'Bohren & Kleben',
                            desc: 'Kombination. Bei Duschkabinen: Wandprofile verschraubt, Glasklemmen verklebt.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 32L14 24"/><path d="M14 24L20 18"/><circle cx="22" cy="16" r="2" fill="none"/><path d="M26 12L26 28C26 29 27 30 28 30L34 30"/></svg>'
                        }
                    ],
                    tip: {
                        icon: '💧',
                        type: 'info',
                        text: '<strong>Hinweis:</strong> Im Nassbereich grundsätzlich <em>abdichtende Dübel</em> (z.B. TOX Aqua Stop Pro) verwenden, damit kein Wasser hinter die Fliese gelangt. Bei bohrfreier Montage ist <em>MS-Polymer Kleber</em> erste Wahl, er haftet auch auf feuchten Untergründen.'
                    }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, allProducts);
                matched.sort(function (a, b) {
                    if (a.highlight && !b.highlight) return -1;
                    if (!a.highlight && b.highlight) return 1;
                    if (a.isMain && !b.isMain) return -1;
                    if (!a.isMain && b.isMain) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.highlight) badges.push({ type: 'perfect', text: 'Top-Empfehlung' });
                    else if (p.isMain) badges.push({ type: 'match', text: 'Empfohlen' });
                    if (p.type) badges.push({ text: p.type.replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); }) });
                    return {
                        product: {
                            title: p.title,
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (D.productImages[p.handle] ? [{ src: D.productImages[p.handle] }] : []),
                            variants: [{ price: p.price }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.price,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zum Montagematerial für meine Dusche.'
            }
        });
    })();
    </script>

</body>
