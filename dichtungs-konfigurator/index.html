<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duschdichtung finden | duschop.de</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --gold: #FFBA00;
      --gold-hover: #e6a800;
      --gold-light: #fff8e6;
      --gray-50: #fafafa;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-300: #d1d1d1;
      --gray-400: #aaaaaa;
      --gray-500: #888888;
      --gray-600: #666666;
      --gray-700: #444444;
      --gray-900: #1a1a1a;
      --green: #22c55e;
      --green-bg: #f0fdf4;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --transition: 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--white);
      color: var(--gray-900);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .finder {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    /* ===== HEADER ===== */
    .finder-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .finder-header .badge {
      display: inline-block;
      background: var(--gold);
      color: var(--black);
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .finder-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 30px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--black);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .finder-header p {
      font-size: 15px;
      color: var(--gray-500);
      max-width: 580px;
      margin: 0 auto;
    }

    /* ===== PROGRESS ===== */
    .progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 32px;
      padding: 0 24px;
    }

    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .progress-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: 2px solid var(--gray-300);
      color: var(--gray-400);
      background: var(--white);
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .progress-dot.active {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--black);
      box-shadow: 0 0 0 4px rgba(255,186,0,0.15);
    }

    .progress-dot.done {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    .progress-dot.done svg { width: 16px; height: 16px; }

    .progress-label {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      white-space: nowrap;
    }

    .progress-label.active { color: var(--gold-hover); }
    .progress-label.done { color: var(--black); }

    .progress-line {
      width: 48px;
      height: 2px;
      background: var(--gray-200);
      margin: 0 -2px;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .progress-line.done { background: var(--black); }

    /* ===== STEPS ===== */
    .step { display: none; animation: fadeSlideIn 0.35s ease; }
    .step.active { display: block; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-question {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 4px;
      text-align: center;
    }

    .step-hint {
      font-size: 14px;
      color: var(--gray-500);
      margin-bottom: 20px;
      text-align: center;
    }

    /* ===== OPTION CARDS ===== */
    .options {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .opt {
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      background: var(--white);
      position: relative;
      user-select: none;
    }

    .opt:hover {
      border-color: var(--gray-300);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .opt.selected {
      border-color: var(--gold);
      background: var(--gold-light);
      box-shadow: 0 0 0 1px var(--gold), var(--shadow);
    }

    .opt.selected::after {
      content: '\2713';
      position: absolute;
      top: 8px;
      right: 10px;
      background: var(--gold);
      color: var(--black);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .opt-icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
      line-height: 1;
    }

    .opt-label {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--black);
      display: block;
      margin-bottom: 3px;
    }

    .opt-desc {
      font-size: 12px;
      color: var(--gray-500);
      line-height: 1.4;
    }

    .opt.opt-lg {
      padding: 24px 18px;
      border-width: 2px;
    }

    .opt.opt-lg .opt-icon { font-size: 36px; margin-bottom: 10px; }
    .opt.opt-lg .opt-label { font-size: 22px; }
    .opt.opt-lg .opt-desc { font-size: 13px; }

    .opt.opt-sm {
      padding: 14px 14px;
      border-width: 1.5px;
      border-color: var(--gray-200);
      opacity: 0.8;
      transition: all var(--transition);
    }

    .opt.opt-sm:hover { opacity: 1; }
    .opt.opt-sm.selected { opacity: 1; }
    .opt.opt-sm .opt-icon { font-size: 22px; margin-bottom: 6px; }
    .opt.opt-sm .opt-label { font-size: 16px; }
    .opt.opt-sm .opt-desc { font-size: 12px; color: var(--gray-400); }

    .opt-popular {
      display: inline-block;
      background: var(--gold);
      color: var(--black);
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    /* Type Selection Grid */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      max-width: 700px;
      margin: 0 auto 16px;
    }

    .type-grid .opt { padding: 28px 18px; }
    .type-grid .opt-label { font-size: 18px; margin-bottom: 6px; }
    .type-grid .opt-desc { font-size: 13px; line-height: 1.5; }
    .type-grid .opt-icon { font-size: 48px; margin-bottom: 12px; }

    /* Glasdicke Grid */
    .glass-grid {
      max-width: 560px;
      margin: 0 auto 16px;
    }

    .glass-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }

    .glass-rare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 380px;
      margin: 0 auto;
    }

    .glass-rare-single {
      grid-template-columns: 1fr;
      max-width: 200px;
    }

    /* Anwendung Grid */
    .anwendung-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 560px;
      margin: 0 auto 16px;
    }

    /* Türtyp Grid */
    .door-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      max-width: 640px;
      margin: 0 auto 16px;
    }

    /* Door Grid for Unten (flex layout) */
    .door-grid-flex {
      display: flex;
      gap: 14px;
      margin-bottom: 16px;
      align-items: stretch;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    .door-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1.2;
    }

    .door-side {
      display: flex;
      align-items: stretch;
      flex: 0.8;
    }

    .door-side .opt {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 16px;
      border-width: 2px;
    }

    /* Anordnung Grid */
    .arrangement-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      max-width: 560px;
      margin: 0 auto 16px;
    }

    /* Winkel Grid */
    .angle-grid {
      max-width: 640px;
      margin: 0 auto 16px;
    }

    .angle-main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }

    .angle-extra {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    .angle-diagram {
      display: block;
      margin: 0 auto 6px;
      max-width: 80px;
    }

    /* ===== SPALTMASS SLIDER ===== */
    .slider-box {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      margin-bottom: 16px;
    }

    .slider-display {
      text-align: center;
      margin-bottom: 20px;
    }

    .slider-value {
      font-family: 'Oswald', sans-serif;
      font-size: 56px;
      font-weight: 700;
      color: var(--black);
      line-height: 1;
    }

    .slider-value span {
      font-size: 22px;
      font-weight: 400;
      color: var(--gray-500);
      margin-left: 2px;
    }

    .slider-label {
      font-size: 13px;
      color: var(--gray-500);
      margin-top: 2px;
    }

    .slider-track {
      position: relative;
      padding: 0 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--fill, 34%), var(--gray-200) var(--fill, 34%), var(--gray-200) 100%);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--white);
      cursor: pointer;
      border: 3px solid var(--gold);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: box-shadow 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    input[type="range"]::-moz-range-thumb {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--white);
      cursor: pointer;
      border: 3px solid var(--gold);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .slider-minmax {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: var(--gray-400);
    }

    .slider-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
    }

    .pill {
      padding: 6px 16px;
      border: 1px solid var(--gray-300);
      border-radius: 20px;
      background: var(--white);
      font-family: 'Roboto', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--gray-700);
    }

    .pill:hover { border-color: var(--gold); color: var(--black); }

    .pill.on {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--black);
    }

    /* ===== MATCH INDICATOR ===== */
    .match-bar {
      background: var(--gray-100);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--gray-600);
    }

    .match-bar strong {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      color: var(--gold-hover);
    }

    .match-bar.good { background: var(--green-bg); }
    .match-bar.good strong { color: var(--green); }

    /* ===== TIP ===== */
    .tip {
      background: var(--gold-light);
      border: 1px solid #ffe49a;
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--gray-700);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.5;
    }

    .tip-icon { flex-shrink: 0; font-size: 16px; }

    /* ===== NAVIGATION ===== */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      gap: 12px;
    }

    .nav-btn {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 13px 30px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .nav-back {
      background: none;
      color: var(--gray-500);
      padding: 13px 16px;
    }
    .nav-back:hover { color: var(--black); }

    .nav-next {
      background: var(--black);
      color: var(--white);
      margin-left: auto;
    }
    .nav-next:hover { background: var(--gray-700); }
    .nav-next:disabled { background: var(--gray-300); color: var(--gray-400); cursor: not-allowed; }

    .nav-results {
      background: var(--gold);
      color: var(--black);
      margin-left: auto;
      font-weight: 600;
    }
    .nav-results:hover { background: var(--gold-hover); }

    /* ===== RESULTS PAGE ===== */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .results-title {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .results-title em {
      color: var(--gold);
      font-style: normal;
    }

    .results-edit {
      font-size: 13px;
      color: var(--gray-500);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: 'Roboto', sans-serif;
    }
    .results-edit:hover { color: var(--black); }

    .filter-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .filter-chip {
      background: var(--gray-100);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--gray-700);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-chip strong { font-weight: 600; color: var(--black); }

    .filter-chip .chip-edit {
      cursor: pointer;
      color: var(--gray-400);
      font-size: 14px;
      line-height: 1;
      transition: color 0.2s;
    }
    .filter-chip .chip-edit:hover { color: var(--black); }

    /* ===== PRODUCT CARDS ===== */
    .products { display: flex; flex-direction: column; gap: 14px; }

    .product {
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 0;
      display: flex;
      transition: all var(--transition);
      background: var(--white);
      overflow: hidden;
    }

    .product:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--gray-300);
    }

    .product.highlight {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold), var(--shadow);
    }

    .product-image {
      width: 130px;
      min-height: 130px;
      background: var(--gray-50);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .product-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: var(--gold);
      color: var(--black);
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .product-body {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .product-name {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--black);
      line-height: 1.3;
    }

    .product-desc {
      font-size: 13px;
      color: var(--gray-500);
      line-height: 1.4;
    }

    .product-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .spec {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      background: var(--gray-100);
      color: var(--gray-600);
      font-weight: 500;
    }

    .spec.match {
      background: #fff3d0;
      color: #7a6000;
    }

    .spec.perfect {
      background: var(--green-bg);
      color: #166534;
    }

    .product-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
      padding-top: 6px;
    }

    .product-price {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--black);
      line-height: 1;
    }

    .product-price small {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--gray-500);
      margin-top: 2px;
    }

    .product-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: var(--gold);
      color: var(--black);
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: var(--radius);
      letter-spacing: 0.5px;
      transition: all var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .product-cta:hover { background: var(--gold-hover); }

    .product-cta svg {
      width: 14px;
      height: 14px;
    }

    .length-info {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 2px;
    }

    /* ===== NO RESULTS ===== */
    .no-results {
      text-align: center;
      padding: 48px 24px;
      background: var(--gray-50);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
    }

    .no-results .nr-icon { font-size: 48px; margin-bottom: 12px; }
    .no-results h3 { font-family: 'Oswald', sans-serif; font-size: 18px; margin-bottom: 8px; text-transform: uppercase; }
    .no-results p { font-size: 14px; color: var(--gray-500); margin-bottom: 16px; max-width: 400px; margin-left: auto; margin-right: auto; }
    .no-results a { color: var(--gold-hover); text-decoration: underline; font-weight: 500; }

    .restart-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      background: none;
      border: 2px solid var(--gray-300);
      border-radius: var(--radius);
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--gray-700);
      transition: all var(--transition);
    }

    .restart-btn:hover {
      border-color: var(--black);
      color: var(--black);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .finder { padding: 16px 12px 48px; }
      .finder-header h1 { font-size: 24px; }
      .finder-header p { font-size: 14px; }
      .options { grid-template-columns: 1fr 1fr; gap: 8px; }
      .type-grid { grid-template-columns: 1fr; gap: 10px; }
      .type-grid .opt { padding: 20px 16px; }
      .type-grid .opt-icon { font-size: 36px; margin-bottom: 8px; }
      .type-grid .opt-label { font-size: 16px; }
      .opt.opt-lg .opt-label { font-size: 18px; }
      .opt.opt-lg { padding: 18px 14px; }
      .glass-rare { max-width: 100%; }
      .anwendung-grid { grid-template-columns: 1fr; }
      .door-grid { grid-template-columns: 1fr; gap: 10px; }

  // Sync selected state
  syncCurrentSelected();
}

function syncCurrentSelected() {
  var field = getStepField();
  var val = sel[field];
  if (val === null || val === undefined) return;
  var container = document.getElementById('step-current');
  if (!container) return;
  container.querySelectorAll('.opt').forEach(function(o) {
    o.classList.remove('selected');
    if (o.dataset.val == val) o.classList.add('selected');
  });
}

function checkArrangementAutoSkip() {
  var avail = getAvailableArrangements();
  if (avail.length <= 1 && avail.length > 0) {
    sel.arrangement = avail[0];
    cur++;
    show();
  }
}

function getAvailableArrangements() {
  var avail = [];
  ['fluchtend', 'ueberlappend'].forEach(function(arrVal) {
    var has = PRODUCTS_SEITLICH.some(function(p) {
      if (sel.glass !== null && p.glass.indexOf(sel.glass) === -1) return false;
      if (sel.application && p.application.indexOf(sel.application) === -1) return false;
      if (sel.door && p.doorType.indexOf(sel.door) === -1) return false;
      return p.arrangement.indexOf(arrVal) !== -1;
    });
    if (has) avail.push(arrVal);
  });
  return avail;
}

  var el = document.getElementById('progress');
  var flow = getFlow();
  var count = flow.labels.length;
  el.innerHTML = '';
  for (var i = 0; i < count; i++) {
    var step = document.createElement('div');
    step.className = 'progress-step';
    var dot = document.createElement('div');
    var curIdx = (cur === 'results') ? count : cur;
    dot.className = 'progress-dot' + (i < curIdx ? ' done' : i === curIdx ? ' active' : '');
    dot.innerHTML = i < curIdx
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>'
      : (i + 1);
    step.appendChild(dot);
    var label = document.createElement('div');
    label.className = 'progress-label' + (i < curIdx ? ' done' : i === curIdx ? ' active' : '');
    label.textContent = flow.labels[i];
    step.appendChild(label);
    el.appendChild(step);
    if (i < count - 1) {
      var line = document.createElement('div');
      line.className = 'progress-line' + (i < curIdx ? ' done' : '');
      el.appendChild(line);
    }
  }
}

// ==================================================================
// MAIN SHOW
// ==================================================================
function show() {
  if (cur === 'results') {
    document.getElementById('stepContainer').innerHTML = '';
    document.getElementById('step-results').classList.add('active');
    document.getElementById('step-results').style.display = 'block';
    document.getElementById('nav').style.display = 'none';
    renderResults();
    renderProgress();
    return;
  }

  document.getElementById('step-results').style.display = 'none';
  document.getElementById('step-results').classList.remove('active');
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('btnBack').style.visibility = cur > 0 ? 'visible' : 'hidden';

  var stepCount = getStepCount();
  var btnNext = document.getElementById('btnNext');
  if (cur === stepCount - 1) {
    btnNext.className = 'nav-btn nav-results';
    btnNext.innerHTML = 'Ergebnisse anzeigen &rarr;';
  } else {
    btnNext.className = 'nav-btn nav-next';
    btnNext.innerHTML = 'Weiter &rarr;';
  }

  renderStep();
  updateNav();
  renderProgress();
}

function updateNav() {
  var btn = document.getElementById('btnNext');
  var field = getStepField();
  if (field === 'gap') btn.disabled = false;
  else btn.disabled = sel[field] === null || sel[field] === undefined;
}

// ==================================================================
// INTERACTIONS
// ==================================================================
function pickType(el) {
  var card = el.closest('.opt');
  sel.type = card.dataset.val;
  // Set default gap for type
  if (sel.type === 'magnet') sel.gap = 18;
  else if (sel.type === 'seitlich') sel.gap = 10;
  else sel.gap = 12;
  // Clear type-specific fields
  sel.glass = null; sel.form = null; sel.application = null; sel.door = null; sel.arrangement = null; sel.angle = null;
  card.closest('.type-grid').querySelectorAll('.opt').forEach(function(o) { o.classList.remove('selected'); });
  card.classList.add('selected');
  setTimeout(function() { next(); }, 280);
}

function pickOpt(el, field) {
  var card = el.closest('.opt');
  var val = card.dataset.val;

  if (field === 'glass') sel.glass = parseInt(val);
  else if (field === 'angle') sel.angle = (val === '90-pendel') ? val : parseInt(val);
  else sel[field] = val;

  var parent = card.closest('.type-grid') || card.closest('.glass-grid') || card.closest('.anwendung-grid') || card.closest('.door-grid') || card.closest('.door-grid-flex') || card.closest('.arrangement-grid') || card.closest('.angle-grid');
  if (parent) parent.querySelectorAll('.opt').forEach(function(o) { o.classList.remove('selected'); });
  card.classList.add('selected');
  updateNav();
  setTimeout(function() { next(); }, 280);
}

function next() {
  var stepCount = getStepCount();
  if (cur < stepCount - 1) { cur++; show(); }
  else { cur = 'results'; show(); }
}

function back() {
  if (cur === 'results') { cur = getStepCount() - 1; show(); return; }
  if (cur > 0) {
    // If going back from gap step in seitlich and arrangement was auto-skipped
    if (sel.type === 'seitlich' && getStepField() === 'gap') {
      var arrIdx = getFlow().fields.indexOf('arrangement');
      var avail = getAvailableArrangements();
      if (avail.length <= 1) {
        sel.arrangement = null;
        cur = arrIdx - 1; // skip back over arrangement to door
        show(); return;
      }
    }
    cur--;
    show();
  }
}

function goToStep(s) {
  cur = s;
  show();
}

function reset() {
  sel = { type: null, glass: null, form: null, application: null, door: null, arrangement: null, angle: null, gap: 12 };
  cur = 0;
  show();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================================================================
// GAP SLIDER
// ==================================================================
function onSlider(v) {
  sel.gap = parseInt(v);
  document.getElementById('sliderVal').innerHTML = v + '<span>mm</span>';
  updateSliderFill();
  updateMatchBar();
  syncPills();
}

function updateSliderFill() {
  var slider = document.getElementById('gapSlider');
  if (!slider) return;
  var min = parseInt(slider.min);
  var max = parseInt(slider.max);
  var pct = ((sel.gap - min) / (max - min)) * 100;
  slider.style.setProperty('--fill', pct + '%');
}

function setGap(v) {
  sel.gap = v;
  var slider = document.getElementById('gapSlider');
  if (slider) slider.value = v;
  onSlider(v);
}

function buildPills() {
  var vals = sel.type === 'magnet' ? [8,12,15,18,20,22,25,28,31]
    : sel.type === 'seitlich' ? [0,3,5,8,10,12,15,18,22,25,30]
    : [3,5,8,10,12,15,18,22,25,30];
  var el = document.getElementById('pills');
  if (!el) return;
  el.innerHTML = vals.map(function(v) {
    return '<button class="pill' + (v === sel.gap ? ' on' : '') + '" onclick="setGap(' + v + ')">' + v + ' mm</button>';
  }).join('');
}

function syncPills() {
  document.querySelectorAll('.pill').forEach(function(p) {
    p.classList.toggle('on', parseInt(p.textContent) === sel.gap);
  });
}

// ==================================================================
// MATCH INDICATOR
// ==================================================================
function updateMatchBar() {
  var bar = document.getElementById('matchBar');
  var countEl = document.getElementById('matchCount');
  var textEl = document.getElementById('matchText');
  if (!bar) return;

  var count = countMatches();
  countEl.textContent = count;
  if (count === 0) {
    bar.className = 'match-bar';
    textEl.textContent = 'Keine passende Dichtung \u2013 versuchen Sie andere Werte.';
  } else if (count <= 3) {
    bar.className = 'match-bar good';
    textEl.textContent = count === 1 ? 'passende Dichtung \u2013 perfekt!' : 'passende Dichtungen f\u00fcr Ihre Auswahl';
  } else {
    bar.className = 'match-bar good';
    textEl.textContent = 'passende Dichtungen gefunden';
  }
}

function countMatches() {
  return getFilteredProducts().length;
}

// ==================================================================
// FILTERING
// ==================================================================
function getFilteredProducts() {
  if (sel.type === 'unten') return filterUnten();
  if (sel.type === 'seitlich') return filterSeitlich();
  if (sel.type === 'magnet') return filterMagnet(false);
  return [];
}

function filterUnten() {
  return PRODUCTS_UNTEN.filter(function(p) {
    if (sel.glass !== null && p.glass.indexOf(sel.glass) === -1) return false;
    if (sel.form && p.form !== sel.form) return false;
    if (sel.gap !== null && (sel.gap < p.gapMin || sel.gap > p.gapMax)) return false;
    if (sel.door && p.doorType.indexOf(sel.door) === -1) return false;
    return true;
  });
}

function filterSeitlich(skipGap) {
  return PRODUCTS_SEITLICH.filter(function(p) {
    if (sel.glass !== null && p.glass.indexOf(sel.glass) === -1) return false;
    if (sel.application && p.application.indexOf(sel.application) === -1) return false;
    if (sel.door && p.doorType.indexOf(sel.door) === -1) return false;
    if (sel.arrangement && p.arrangement.indexOf(sel.arrangement) === -1) return false;
    if (!skipGap && sel.gap !== null) {
      if (sel.gap < p.gapMin || sel.gap > p.gapMax) return false;
    }
    return true;
  });
}

function filterMagnet(includeFallback) {
  return PRODUCTS_MAGNET.filter(function(p) {
    if (!includeFallback && p.fallback) return false;
    if (sel.angle !== null) {
      if (sel.angle === '90-pendel') { if (!p.pendel) return false; }
      else { if (!p.angle || p.angle.indexOf(sel.angle) === -1) return false; if (p.pendel) return false; }
    }
    if (sel.glass !== null && p.glass.indexOf(sel.glass) === -1) return false;
    if (sel.glass !== null && p.gapByGlass) {
      var g = String(sel.glass);
      if (!p.gapByGlass[g]) return false;
      var range = p.gapByGlass[g];
      if (sel.gap < range[0] || sel.gap > range[1]) return false;
    }
    return true;
  });
}

// ==================================================================
// RESULTS
// ==================================================================
function getResults() {
  if (sel.type === 'unten') {
    return filterUnten().sort(function(a, b) {
      if (a.bestseller && !b.bestseller) return -1;
      if (!a.bestseller && b.bestseller) return 1;
      var fitA = Math.abs(((a.gapMin + a.gapMax) / 2) - sel.gap);
      var fitB = Math.abs(((b.gapMin + b.gapMax) / 2) - sel.gap);
      return fitA - fitB;
    });
  }
  if (sel.type === 'seitlich') {
    var sortOrder = { lippe: 1, ballon: 2, spalt: 3, ueberlappung: 1, sonstige: 5 };
    return filterSeitlich().sort(function(a, b) {
      if (a.bestseller && !b.bestseller) return -1;
      if (!a.bestseller && b.bestseller) return 1;
      var prioA = sortOrder[a.sortType] || 5;
      var prioB = sortOrder[b.sortType] || 5;
      if (prioA !== prioB) return prioA - prioB;
      var fitA = Math.abs(((a.gapMin + a.gapMax) / 2) - sel.gap);
      var fitB = Math.abs(((b.gapMin + b.gapMax) / 2) - sel.gap);
      if (fitA !== fitB) return fitA - fitB;
      return a.priceFrom - b.priceFrom;
    });
  }
  if (sel.type === 'magnet') {
    var results = filterMagnet(false);
    if (results.length === 0) results = filterMagnet(true);
    return results.sort(function(a, b) {
      if (a.bestseller && !b.bestseller) return -1;
      if (!a.bestseller && b.bestseller) return 1;
      var g = String(sel.glass);
      var rangeA = a.gapByGlass[g] || [0,0];
      var rangeB = b.gapByGlass[g] || [0,0];
      var fitA = Math.abs(((rangeA[0] + rangeA[1]) / 2) - sel.gap);
      var fitB = Math.abs(((rangeB[0] + rangeB[1]) / 2) - sel.gap);
      return fitA - fitB;
    });
  }
  return [];
}

function renderResults() {
  var results = getResults();
  var flow = getFlow();

  // Title
  document.getElementById('resultsTitle').innerHTML =
    '<em>' + results.length + '</em> passende Dichtung' + (results.length !== 1 ? 'en' : '');

  // Filter chips
  var typeLabels = { unten: 'Untere Dichtung', seitlich: 'Seitliche Dichtung', magnet: 'Magnetdichtung' };
  var doorLabels = { dreh: 'Dreht\u00fcr', pendel: 'Pendelt\u00fcr', schiebe: 'Schiebet\u00fcr' };
  var doorLabelsUnten = { dreh: 'Dreh- / Pendelt\u00fcr', schiebe: 'Schiebet\u00fcr' };
  var appLabels = { 'glas-glas': 'Glas-Glas', 'glas-wand': 'Glas-Wand' };
  var arrLabels = { fluchtend: 'Fluchtend (180\u00b0)', ueberlappend: '\u00dcberlappend (180\u00b0)' };
  var formLabels = { gerade: 'Gerade', gebogen: 'Gebogen' };
  var angleLabels = { 90: '90\u00b0 Ecke', '90-pendel': '90\u00b0 Pendelt\u00fcr', 135: '135\u00b0 F\u00fcnfeck', 180: '180\u00b0 Fluchtend' };

  var chips = '<div class="filter-chip">Typ: <strong>' + typeLabels[sel.type] + '</strong><span class="chip-edit" onclick="goToStep(0)">\u270e</span></div>';

  flow.fields.forEach(function(f, i) {
    if (f === 'type') return;
    var label = '', value = '';
    if (f === 'glass') { label = 'Glasdicke'; value = sel.glass + ' mm'; }
    else if (f === 'form') { label = 'Glasform'; value = formLabels[sel.form] || '\u2013'; }
    else if (f === 'application') { label = 'Anwendung'; value = appLabels[sel.application] || '\u2013'; }
    else if (f === 'door') { label = 'T\u00fcrtyp'; value = (sel.type === 'unten' ? doorLabelsUnten : doorLabels)[sel.door] || '\u2013'; }
    else if (f === 'arrangement') { label = 'Anordnung'; value = arrLabels[sel.arrangement] || '\u2013'; }
    else if (f === 'angle') { label = 'Winkel'; value = angleLabels[sel.angle] || '\u2013'; }
    else if (f === 'gap') { label = 'Spaltma\u00df'; value = sel.gap + ' mm'; }
    chips += '<div class="filter-chip">' + label + ': <strong>' + value + '</strong><span class="chip-edit" onclick="goToStep(' + i + ')">\u270e</span></div>';
  });

  document.getElementById('filterSummary').innerHTML = chips;

  // Product list
  var list = document.getElementById('productList');

  if (results.length === 0) {
    list.innerHTML = '<div class="no-results"><div class="nr-icon">\uD83D\uDD0D</div><h3>Keine passende Dichtung gefunden</h3>' +
      '<p>Versuchen Sie es mit anderen Werten oder kontaktieren Sie uns direkt.</p>' +
      '<p><a href="https://duschop.de/pages/kontakt" target="_blank">\uD83D\uDCE7 Pers\u00f6nliche Beratung anfragen</a></p></div>';
    return;
  }

  list.innerHTML = results.map(function(p, i) {
    var g = String(sel.glass);
    var url = 'https://duschop.de/products/' + p.handle;
    if (p.variants && p.variants[g]) {
      var firstLen = Object.keys(p.variants[g])[0];
      var variantId = p.variants[g][firstLen];
      if (variantId && variantId !== 0) url += '?variant=' + variantId;
    }

    var availLengths = (p.variants && p.variants[g]) ? Object.keys(p.variants[g]) : p.lengths;

    // Gap info
    var gapInfo = '';
    if (sel.type === 'magnet' && p.gapByGlass) {
      var range = p.gapByGlass[g] || [0,0];
      var fitDist = Math.abs(((range[0] + range[1]) / 2) - sel.gap);
      var isPerfect = fitDist <= 2;
      gapInfo = '<span class="spec ' + (isPerfect ? 'perfect' : 'match') + '">' +
        (isPerfect ? '\u2713 ' : '') + 'Spalt: ' + range[0] + (range[0] !== range[1] ? '\u2013' + range[1] : '') + ' mm (' + sel.glass + ' mm Glas)</span>';
    } else if (p.gapMin !== undefined) {
      var fitDist2 = Math.abs(((p.gapMin + p.gapMax) / 2) - sel.gap);
      var isPerfect2 = fitDist2 <= 2;
      gapInfo = '<span class="spec ' + (isPerfect2 ? 'perfect' : 'match') + '">' +
        (isPerfect2 ? '\u2713 ' : '') + 'Spalt: ' + p.gapMin + '\u2013' + p.gapMax + ' mm</span>';
    }

    // Extra specs
    var extraSpecs = '';
    if (sel.type === 'seitlich') {
      var appInfo = p.application.map(function(a) { return a === 'glas-glas' ? 'Glas-Glas' : 'Glas-Wand'; }).join(', ');
      var arrInfo = p.arrangement.map(function(a) { return a === 'fluchtend' ? '180\u00b0' : '90\u00b0'; }).join(', ');
      extraSpecs = '<span class="spec match">' + arrInfo + '</span><span class="spec match">' + appInfo + '</span>';
    }
    if (sel.type === 'magnet' && p.angle) {
      var angleInfo = p.angle.map(function(a) { return a + '\u00b0'; }).join(', ');
      extraSpecs = '<span class="spec match">' + angleInfo + '</span>';
    }

    var lengthPrefix = (sel.type === 'unten' && p.form === 'gebogen') ? 'Gesamtl\u00e4nge: ' : 'Verf\u00fcgbare L\u00e4ngen: ';
    var priceSmall = sel.type === 'magnet' ? 'inkl. MwSt., zzgl. Versand \u00b7 1 Paar' : 'inkl. MwSt., zzgl. Versand';

    return '<div class="product ' + (i === 0 ? 'highlight' : '') + '">' +
      '<div class="product-image">' +
      '<img src="' + p.image + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' +
      (p.bestseller ? '<div class="product-badge">\u2B50 Bestseller</div>' : '') +
      (i === 0 && !p.bestseller ? '<div class="product-badge" style="background:var(--green);color:#fff">Beste Wahl</div>' : '') +
      '</div>' +
      '<div class="product-body">' +
      '<div class="product-name">' + p.name + '</div>' +
      '<div class="product-desc">' + p.desc + '</div>' +
      '<div class="product-specs">' +
      '<span class="spec">Art.Nr. ' + p.artNr + '</span>' +
      extraSpecs +
      gapInfo +
      '<span class="spec">Glas: ' + p.glass.join(', ') + ' mm</span>' +
      '</div>' +
      '<div class="length-info">' + lengthPrefix + availLengths.join(' \u00b7 ') + '</div>' +
      '<div class="product-footer">' +
      '<div class="product-price">ab ' + p.priceFrom.toFixed(2).replace('.', ',') + ' \u20ac<small>' + priceSmall + '</small></div>' +
      '<a href="' + url + '" target="_blank" class="product-cta">Zum Produkt' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>' +
      '</div></div></div>';
  }).join('');
}

// ==================================================================
// INIT
// ==================================================================
show();
</script>
