<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinigung &amp; Pflege | duschop.de</title>
    <meta name="description" content="Das richtige Reinigungs- und Pflegeprodukt f&uuml;r Ihr Duschglas finden &mdash; je nach Ziel, Verschmutzungsgrad und Beschichtung.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>REINIGUNG &amp; PFLEGE</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.ReinigungData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'reinigung-pflege',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('duschglas-reinigungs-set', D.products); },

            hero: {
                badge: 'In 3 Schritten zum richtigen Produkt',
                title: 'Reinigung & Pflege',
                desc: 'Kalkflecken entfernen, versiegeln oder beides — wir zeigen Ihnen, welches Produkt zu Ihrem Glaszustand und Ihren Zielen passt.'
            },

            steps: [
                // ---- 1. Ziel ----
                {
                    key: 'ziel',
                    shortLabel: 'Ziel',
                    question: 'Was möchten Sie erreichen?',
                    hint: 'Reinigen oder schützen — oder beides in einem.',
                    options: [
                        {
                            value: 'reinigung',
                            label: 'Reinigung',
                            desc: 'Kalk, Wasserflecken und Seifenreste vom Duschglas entfernen.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round"><path d="M10 30L10 14C10 12 12 10 14 10L26 10C28 10 30 12 30 14L30 30"/><path d="M8 30L32 30"/><path d="M16 16L16 24"/><path d="M20 14L20 24"/><path d="M24 16L24 24"/></svg>'
                        },
                        {
                            value: 'schutz',
                            label: 'Glasschutz',
                            desc: 'Glas versiegeln, damit Kalk und Schmutz gar nicht erst haften.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 4L6 10V20C6 28 12 34 20 36C28 34 34 28 34 20V10L20 4Z"/><polyline points="14 20 18 24 26 16"/></svg>'
                        },
                        {
                            value: 'beides',
                            label: 'Reinigung & Schutz',
                            desc: 'Erst gründlich reinigen, dann versiegeln. Die Komplettlösung.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5" stroke-linecap="round"><path d="M8 28L8 16C8 14 10 12 12 12L22 12C24 12 26 14 26 16L26 28"/><path d="M6 28L28 28"/><path d="M30 8L28 14V22C28 26 32 30 34 30"/><path d="M30 8L34 8"/><polyline points="30 18 32 20 36 16"/></svg>',
                            badge: { type: 'standard', text: 'Empfohlen' }
                        }
                    ]
                },

                // ---- 2. Verschmutzungsgrad ----
                {
                    key: 'verschmutzung',
                    shortLabel: 'Verschmutzung',
                    question: 'Wie verschmutzt ist Ihr Duschglas?',
                    hint: 'Der Verschmutzungsgrad bestimmt, welche Reinigungsprodukte wir empfehlen.',
                    options: [
                        {
                            value: 'leicht',
                            label: 'Leicht',
                            desc: 'Vereinzelte Wasserflecken und leichter Kalkschleier. Glas ist noch weitgehend durchsichtig.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="8" y="4" width="24" height="32" rx="2" fill="none"/><circle cx="16" cy="14" r="1.5" fill="#c8956c" opacity="0.3"/><circle cx="24" cy="20" r="1" fill="#c8956c" opacity="0.3"/><circle cx="20" cy="28" r="1.5" fill="#c8956c" opacity="0.2"/></svg>'
                        },
                        {
                            value: 'mittel',
                            label: 'Mittel',
                            desc: 'Deutlich sichtbare Kalkablagerungen und Seifenreste. Glas wirkt trüb.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="8" y="4" width="24" height="32" rx="2" fill="none"/><circle cx="14" cy="12" r="2" fill="#c8956c" opacity="0.4"/><circle cx="24" cy="16" r="2.5" fill="#c8956c" opacity="0.4"/><circle cx="18" cy="24" r="2" fill="#c8956c" opacity="0.35"/><circle cx="26" cy="28" r="1.5" fill="#c8956c" opacity="0.3"/><circle cx="12" cy="30" r="2" fill="#c8956c" opacity="0.35"/></svg>'
                        },
                        {
                            value: 'stark',
                            label: 'Stark',
                            desc: 'Hartnäckige, verhärtete Ablagerungen. Glas fühlt sich rau an, stellenweise undurchsichtig.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="8" y="4" width="24" height="32" rx="2" fill="none"/><rect x="10" y="6" width="20" height="28" rx="1" fill="#c8956c" opacity="0.15"/><circle cx="14" cy="12" r="3" fill="#c8956c" opacity="0.5"/><circle cx="24" cy="14" r="3.5" fill="#c8956c" opacity="0.45"/><circle cx="18" cy="22" r="3" fill="#c8956c" opacity="0.5"/><circle cx="26" cy="26" r="2.5" fill="#c8956c" opacity="0.45"/><circle cx="12" cy="28" r="3" fill="#c8956c" opacity="0.5"/></svg>'
                        }
                    ],
                    tip: {
                        icon: '💡',
                        type: 'info',
                        text: '<strong>Tipp:</strong> Auch stark verkalktes Glas wird mit den richtigen Produkten wieder klar. Die Kombination aus chemischer Reinigung (<em>Kalklöser</em>) und mechanischer Reinigung (<em>Stahlwolle Typ 0000</em>) bringt die besten Ergebnisse.'
                    }
                },

                // ---- 3. Oberfläche ----
                {
                    key: 'oberflaeche',
                    shortLabel: 'Glastyp',
                    question: 'Ist Ihr Duschglas bereits beschichtet?',
                    hint: 'Manche Reinigungsprodukte sind nicht für nanobeschichtetes Glas geeignet. Im Zweifel „weiß ich nicht" wählen.',
                    options: [
                        {
                            value: 'unbeschichtet',
                            label: 'Unbeschichtet',
                            desc: 'Standard-Glas ohne Beschichtung. Alle Reinigungsprodukte verwendbar.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="8" y="4" width="24" height="32" rx="2"/></svg>',
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'beschichtet',
                            label: 'Nanobeschichtet',
                            desc: 'Lotus-Effekt-Beschichtung (z.B. EasyClean, Nano). Nur schonende Reiniger.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="8" y="4" width="24" height="32" rx="2"/><path d="M8 6L32 6" stroke="#27ae60" stroke-width="3"/><circle cx="16" cy="18" r="3" fill="none" stroke="#27ae60" stroke-width="1.5" opacity="0.5"/></svg>'
                        },
                        {
                            value: 'unbekannt',
                            label: 'Weiß ich nicht',
                            desc: 'Im Zweifel diese Option. Wir empfehlen dann beschichtungsfreundliche Produkte.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none" stroke="#c8956c" stroke-width="2.5"><rect x="8" y="4" width="24" height="32" rx="2"/><text x="20" y="26" text-anchor="middle" font-size="18" fill="#c8956c" font-weight="700" stroke="none">?</text></svg>'
                        }
                    ],
                    tip: {
                        icon: '💧',
                        type: 'info',
                        text: '<strong>Wie erkennt man eine Beschichtung?</strong> Wasser auf das trockene Glas gießen. Perlt es ab und bildet Tropfen, ist eine Beschichtung vorhanden. Fließt es als Film ab, ist das Glas unbeschichtet.'
                    }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, allProducts);
                matched.sort(function (a, b) {
                    if (a.highlight && !b.highlight) return -1;
                    if (!a.highlight && b.highlight) return 1;
                    if (a.isSet && !b.isSet) return -1;
                    if (!a.isSet && b.isSet) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.highlight) badges.push({ type: 'perfect', text: 'Top-Empfehlung' });
                    else if (p.isSet) badges.push({ type: 'perfect', text: 'Komplett-Set' });
                    else badges.push({ text: p.type ? p.type.charAt(0).toUpperCase() + p.type.slice(1) : 'Einzelprodukt' });
                    return {
                        product: {
                            title: p.title,
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (D.productImages[p.handle] ? [{ src: D.productImages[p.handle] }] : []),
                            variants: [{ price: p.price }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.price,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zur Reinigung oder Pflege meines Duschglases.'
            }
        });
    })();
    </script>

    <a href="https://wa.me/4917654505183?text=Hallo%2C%20ich%20brauche%20eine%20kurze%20Beratung%20zur%20Reinigung%20meines%20Duschglases." class="duschop-wa-sticky" target="_blank" rel="noopener" data-track="whatsapp-reinigung">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.693.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

    <script src="../tracker.js" async></script>
</body>
</html>
