<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duschglas-Konfigurator | duschop.de</title>
    <meta name="description" content="ESG-Sicherheitsglas nach Ma&szlig; konfigurieren, Klarglas, Milchglas, Antikorrosion oder Motivglas, mit optionaler Veredelung.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>DUSCHGLAS-KONFIGURATOR</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.DuschglasData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'duschglas-konfigurator',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('esg-duschglaswand', D.products); },

            hero: {
                badge: 'In 3 Schritten zum richtigen Glas',
                title: 'Duschglas-Konfigurator',
                desc: 'ESG-Sicherheitsglas nach Maß, wir zeigen Ihnen, welche Optik, welche Qualität und welche Veredelung zu Ihrem Bad passt.'
            },

            steps: [
                // ---- 1. Glasoptik ----
                {
                    key: 'glasoptik',
                    shortLabel: 'Optik',
                    question: 'Welche Glasoptik möchten Sie?',
                    hint: 'Wählen Sie die gewünschte Optik für Ihre Duschtrennwand.',
                    options: [
                        {
                            value: 'klar',
                            label: 'Klarglas (durchsichtig)',
                            desc: 'Transparentes ESG-Sicherheitsglas. Offenes, großzügiges Raumgefühl. Der Klassiker.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="8" y="4" width="24" height="32" rx="2" fill="#d4eeff" stroke="#7ab8e0" stroke-width="2"/></svg>',
                            badge: { type: 'standard', text: 'Häufig' }
                        },
                        {
                            value: 'satiniert',
                            label: 'Satiniert (Milchglas)',
                            desc: 'Blickdichtes Sichtschutzglas mit samtiger Oberfläche.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="8" y="4" width="24" height="32" rx="2" fill="#e8e8e8" stroke="#a8a8a8" stroke-width="2"/></svg>'
                        },
                        {
                            value: 'motiv',
                            label: 'Mit Motiv / Design',
                            desc: 'Individuelles Design per Lasertechnologie. Über 80 Motive verfügbar.',
                            icon: '<svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect x="6" y="4" width="28" height="32" rx="2" fill="#e8d8f0" stroke="#a090c0" stroke-width="1.5"/><circle cx="20" cy="18" r="6" stroke="#8070a0" stroke-width="1.5" fill="none"/></svg>',
                            badge: { type: 'trend', text: 'Premium' }
                        }
                    ]
                },

                // ---- 2. Qualität ----
                {
                    key: 'qualitaet',
                    shortLabel: 'Qualität',
                    questionFn: function (state) {
                        if (state.glasoptik === 'motiv') return 'Welche Motivserie?';
                        return 'Welche Glasqualität?';
                    },
                    hintFn: function (state) {
                        if (state.glasoptik === 'motiv') return 'Zwei Serien mit je über 40 Motiven, per Laser dauerhaft ins Glas eingearbeitet.';
                        if (state.glasoptik === 'klar') return 'Standard-ESG oder Premium-Antikorrosionsglas, für dauerhaft klare Sicht.';
                        return 'Standard-ESG für die meisten Anwendungen.';
                    },
                    skipFn: function (state) {
                        // Bei satiniert gibt es nur Standard, Step überspringen, vorbelegen
                        return state.glasoptik === 'satiniert';
                    },
                    optionsFn: function (state) {
                        if (state.glasoptik === 'klar') {
                            return [
                                { value: 'standard',      label: 'Standard ESG Klarglas',           desc: D.qualitaetDefs.standard.desc },
                                { value: 'antikorrosion', label: 'Antikorrosionsglas (SGG Timeless)', desc: D.qualitaetDefs.antikorrosion.desc, badge: { type: 'trend', text: 'Premium' } }
                            ];
                        }
                        if (state.glasoptik === 'motiv') {
                            return [
                                { value: 'serie-paimu', label: 'Serie Paimu', desc: D.qualitaetDefs['serie-paimu'].desc },
                                { value: 'serie-makai', label: 'Serie Makai', desc: D.qualitaetDefs['serie-makai'].desc }
                            ];
                        }
                        return [];
                    },
                    tip: {
                        icon: '🛡️',
                        type: 'info',
                        text: '<strong>Antikorrosionsglas</strong> verhindert das gefürchtete „Blindwerden" durch Kalk und Feuchtigkeit. Eine Investition, die sich über Jahre auszahlt.'
                    }
                },

                // ---- 3. Veredelung ----
                {
                    key: 'veredelung',
                    shortLabel: 'Veredelung',
                    question: 'Möchten Sie eine Veredelung?',
                    hint: 'Optionale Upgrades für mehr Langlebigkeit. „Keine" ist eine vollwertige Wahl, Sie bekommen trotzdem ein hochwertiges ESG-Glas.',
                    optionsFn: function (state) {
                        var opts = [
                            { value: 'easyclean', label: D.veredelungDefs.easyclean.name, desc: D.veredelungDefs.easyclean.desc + ' Aufpreis: +' + D.veredelungDefs.easyclean.price + ' € pro Scheibe.' }
                        ];
                        if (state.glasoptik === 'klar' && state.qualitaet === 'standard') {
                            opts.push({ value: 'weissglas', label: D.veredelungDefs.weissglas.name, desc: D.veredelungDefs.weissglas.desc + ' Aufpreis: +' + D.veredelungDefs.weissglas.price + ' € pro Scheibe.' });
                        }
                        opts.push({ value: 'keine', label: 'Keine Veredelung', desc: 'Vollwertiges ESG-Sicherheitsglas ohne Zusatz. Volle Garantie, gewohnte Pflege.', badge: { type: 'standard', text: 'Üblich' } });
                        return opts;
                    },
                    tip: {
                        icon: '💧',
                        type: 'info',
                        text: '<strong>Easyclean</strong> ist werksseitige Nanobeschichtung, deutlich weniger Reinigungsaufwand. <strong>Weißglas</strong> hat keinen Grünstich an den Kanten, wirkt brillanter, aber kostet mehr.'
                    }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, allProducts);
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (state.veredelung && state.veredelung !== 'keine') {
                        badges.push({ type: 'match', text: 'Mit ' + D.veredelungDefs[state.veredelung].name });
                    }
                    if (p.qualitaet === 'antikorrosion') badges.push({ type: 'perfect', text: 'Antikorrosion' });
                    return {
                        product: {
                            title: p.title,
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (D.productImages[p.handle] ? [{ src: D.productImages[p.handle] }] : []),
                            variants: [{ price: p.price }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.price,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich habe den Duschglas-Konfigurator genutzt und bräuchte eine kurze Beratung, ich brauche Maße und Bohrungen.'
            }
        });
    })();
    </script>

        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

    <script src="../tracker.js" async></script>
</body>
</html>
