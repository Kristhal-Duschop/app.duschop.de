// ==================================================================
// STATE
// ==================================================================
var sel = { type: null, glass: null };
var cur = 0;
var STEPS = [
  { field: 'type', label: 'Dichtungsart' },
  { field: 'glass', label: 'Glasdicke' }
];

// ==================================================================
// FLOW HELPERS
// ==================================================================
function getStepField() { return STEPS[cur].field; }
function getStepCount() { return STEPS.length; }

function getAvailableGlass() {
  var glassSet = {};
  PRODUCTS.forEach(function(p) {
    if (sel.type && p.type !== sel.type) return;
    p.glass.forEach(function(g) { glassSet[g] = true; });
  });
  var arr = Object.keys(glassSet).map(Number);
  arr.sort(function(a, b) { return a - b; });
  return arr;
}

// ==================================================================
// RENDER STEP
// ==================================================================
function renderStep() {
  var container = document.getElementById('wk-stepContainer');
  var field = getStepField();
  var html = '';

  if (field === 'type') {
    html = '<div class="step active" id="wk-step-current">' +
      '<div class="step-question">Welche Verbindungsart?</div>' +
      '<div class="step-hint">W&auml;hlen Sie, wie Ihre Glaselemente verbunden sind.</div>' +
      '<div class="type-grid">' +
        '<div class="opt" data-val="90" onclick="wk_pickOpt(this,\'type\')">' +
          '<span class="opt-icon">&#8633;</span>' +
          '<span class="opt-label">90&deg; &Uuml;berlappung</span>' +
          '<span class="opt-desc">F&uuml;r Schiebe- und Gleitelemente mit &uuml;berlappenden Glasscheiben</span>' +
        '</div>' +
        '<div class="opt" data-val="180" onclick="wk_pickOpt(this,\'type\')">' +
          '<span class="opt-icon">&#8596;</span>' +
          '<span class="opt-label">180&deg; Fuge / Sto&szlig;</span>' +
          '<span class="opt-desc">F&uuml;r Glas-Glas-Verbindungen in einer Flucht (Sto&szlig;fuge)</span>' +
        '</div>' +
        '<div class="opt" data-val="ballon" onclick="wk_pickOpt(this,\'type\')">' +
          '<span class="opt-icon">&#9898;</span>' +
          '<span class="opt-label">Ballondichtung</span>' +
          '<span class="opt-desc">Streif- &amp; Anschlagdichtung mit weichem Ballonprofil</span>' +
        '</div>' +
      '</div>' +
      '<div class="tip"><span class="tip-icon">&#128161;</span><span><strong>Tipp:</strong> Alle unsere Wintergarten-Dichtungen bestehen aus hochtransparentem, UV-best&auml;ndigem Polycarbonat &ndash; nahezu unsichtbar am Glas.</span></div>' +
    '</div>';
  }

  else if (field === 'glass') {
    var avail = getAvailableGlass();
    var popular = [8, 10];
    html = '<div class="step active" id="wk-step-current">' +
      '<div class="step-question">Welche Glasdicke?</div>' +
      '<div class="step-hint">Messen Sie die Dicke Ihres Wintergarten-Glases.</div>' +
      '<div class="glass-grid"><div class="glass-main">';

    avail.forEach(function(g) {
      var isPop = popular.indexOf(g) !== -1;
      html += '<div class="opt" data-val="' + g + '" onclick="wk_pickOpt(this,\'glass\')">' +
        (isPop ? '<span class="opt-popular">Beliebt</span>' : '') +
        '<span class="opt-label">' + g + ' mm</span>' +
        '<span class="opt-desc">Glasst&auml;rke</span>' +
      '</div>';
    });

    html += '</div></div>' +
      '<div class="tip"><span class="tip-icon">&#128161;</span><span><strong>Tipp:</strong> Die Glasdicke steht oft im Lieferschein oder l&auml;sst sich mit einem Messschieber an der Glaskante ermitteln.</span></div>' +
    '</div>';
  }

  container.innerHTML = html;
  syncCurrentSelected();
}

function syncCurrentSelected() {
  var field = getStepField();
  var val = sel[field];
  if (val === null || val === undefined) return;
  var container = document.getElementById('wk-step-current');
  if (!container) return;
  container.querySelectorAll('.opt').forEach(function(o) {
    o.classList.remove('selected');
    if (o.dataset.val == val) o.classList.add('selected');
  });
}

// ==================================================================
// PROGRESS
// ==================================================================
function renderProgress() {
  var el = document.getElementById('wk-progress');
  var count = STEPS.length;
  el.innerHTML = '';
  for (var i = 0; i < count; i++) {
    var step = document.createElement('div');
    step.className = 'progress-step';
    var dot = document.createElement('div');
    var curIdx = (cur === 'results') ? count : cur;
    dot.className = 'progress-dot' + (i < curIdx ? ' done' : i === curIdx ? ' active' : '');
    dot.innerHTML = i < curIdx
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>'
      : (i + 1);
    step.appendChild(dot);
    var label = document.createElement('div');
    label.className = 'progress-label' + (i < curIdx ? ' done' : i === curIdx ? ' active' : '');
    label.textContent = STEPS[i].label;
    step.appendChild(label);
    el.appendChild(step);
    if (i < count - 1) {
      var line = document.createElement('div');
      line.className = 'progress-line' + (i < curIdx ? ' done' : '');
      el.appendChild(line);
    }
  }
}

// ==================================================================
// MAIN SHOW
// ==================================================================
function show() {
  if (cur === 'results') {
    document.getElementById('wk-stepContainer').innerHTML = '';
    document.getElementById('wk-step-results').classList.add('active');
    document.getElementById('wk-step-results').style.display = 'block';
    document.getElementById('wk-nav').style.display = 'none';
    renderResults();
    renderProgress();
    return;
  }

  document.getElementById('wk-step-results').style.display = 'none';
  document.getElementById('wk-step-results').classList.remove('active');
  document.getElementById('wk-nav').style.display = 'flex';
  document.getElementById('wk-btnBack').style.visibility = cur > 0 ? 'visible' : 'hidden';

  var stepCount = getStepCount();
  var btnNext = document.getElementById('wk-btnNext');
  if (cur === stepCount - 1) {
    btnNext.className = 'nav-btn nav-results';
    btnNext.innerHTML = 'Ergebnisse anzeigen &rarr;';
  } else {
    btnNext.className = 'nav-btn nav-next';
    btnNext.innerHTML = 'Weiter &rarr;';
  }

  renderStep();
  updateNav();
  renderProgress();
}

function updateNav() {
  var btn = document.getElementById('wk-btnNext');
  var field = getStepField();
  btn.disabled = sel[field] === null || sel[field] === undefined;
}

// ==================================================================
// INTERACTIONS
// ==================================================================
function pickOpt(el, field) {
  var card = el.closest('.opt');
  var val = card.dataset.val;

  if (field === 'glass') sel.glass = parseInt(val);
  else sel[field] = val;

  var parent = card.parentElement;
  parent.querySelectorAll('.opt').forEach(function(o) { o.classList.remove('selected'); });
  card.classList.add('selected');
  updateNav();
  setTimeout(function() { next(); }, 280);
}

function next() {
  var stepCount = getStepCount();
  if (cur < stepCount - 1) { cur++; show(); }
  else { cur = 'results'; show(); }
}

function back() {
  if (cur === 'results') { cur = getStepCount() - 1; show(); return; }
  if (cur > 0) { cur--; show(); }
}

function goToStep(s) {
  cur = s;
  show();
}

function reset() {
  sel = { type: null, glass: null };
  cur = 0;
  show();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================================================================
// FILTERING & RESULTS
// ==================================================================
function getFilteredProducts() {
  return PRODUCTS.filter(function(p) {
    if (sel.type && p.type !== sel.type) return false;
    if (sel.glass !== null && p.glass.indexOf(sel.glass) === -1) return false;
    return true;
  });
}

function getResults() {
  return getFilteredProducts().sort(function(a, b) {
    if (a.bestseller && !b.bestseller) return -1;
    if (!a.bestseller && b.bestseller) return 1;
    return a.priceFrom - b.priceFrom;
  });
}

function renderResults() {
  var results = getResults();

  // Title
  document.getElementById('wk-resultsTitle').innerHTML =
    '<em>' + results.length + '</em> passende Dichtung' + (results.length !== 1 ? 'en' : '');

  // Filter chips
  var typeLabels = { '90': '90\u00b0 \u00dcberlappung', '180': '180\u00b0 Fuge / Sto\u00df', 'ballon': 'Ballondichtung' };

  var chips = '<div class="filter-chip">Dichtungsart: <strong>' + typeLabels[sel.type] + '</strong><span class="chip-edit" onclick="wk_goToStep(0)">\u270e</span></div>';
  if (sel.glass !== null) {
    chips += '<div class="filter-chip">Glasdicke: <strong>' + sel.glass + ' mm</strong><span class="chip-edit" onclick="wk_goToStep(1)">\u270e</span></div>';
  }

  document.getElementById('wk-filterSummary').innerHTML = chips;

  // Product list
  var list = document.getElementById('wk-productList');

  if (results.length === 0) {
    list.innerHTML = '<div class="no-results"><div class="nr-icon">\uD83D\uDD0D</div><h3>Keine passende Dichtung gefunden</h3>' +
      '<p>Versuchen Sie es mit anderen Werten oder kontaktieren Sie uns direkt.</p>' +
      '<p><a href="https://duschop.de/pages/kontakt" target="_blank">\uD83D\uDCE7 Pers\u00f6nliche Beratung anfragen</a></p></div>';
    return;
  }

  list.innerHTML = results.map(function(p, i) {
    var g = String(sel.glass);
    var url = '/products/' + p.handle;
    if (p.variants && p.variants[g]) {
      var firstLen = Object.keys(p.variants[g])[0];
      var variantId = p.variants[g][firstLen];
      if (variantId && variantId !== 0) url += '?variant=' + variantId;
    }

    var availLengths = (p.variants && p.variants[g]) ? Object.keys(p.variants[g]) : p.lengths;

    // Specs
    var extraSpecs = '';
    if (p.lipWidths) {
      extraSpecs += '<span class="spec match">Lippenbreiten: ' + p.lipWidths + '</span>';
    }
    var typeLabel = p.type === '90' ? '90\u00b0 \u00dcberlappung' : p.type === '180' ? '180\u00b0 Fuge' : 'Ballondichtung';
    extraSpecs += '<span class="spec match">' + typeLabel + '</span>';

    return '<div class="product ' + (i === 0 ? 'highlight' : '') + '">' +
      '<div class="product-image">' +
      '<img src="' + p.image + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' +
      (p.bestseller ? '<div class="product-badge">\u2B50 Bestseller</div>' : '') +
      (i === 0 && !p.bestseller ? '<div class="product-badge" style="background:var(--green);color:#fff">Beste Wahl</div>' : '') +
      '</div>' +
      '<div class="product-body">' +
      '<div class="product-name">' + p.name + '</div>' +
      '<div class="product-desc">' + p.desc + '</div>' +
      '<div class="product-specs">' +
      '<span class="spec">Art.Nr. ' + p.artNr + '</span>' +
      extraSpecs +
      '<span class="spec">\u2713 Glas: ' + p.glass.join(', ') + ' mm</span>' +
      '</div>' +
      '<div class="length-info">Verf\u00fcgbare L\u00e4ngen: ' + availLengths.join(' \u00b7 ') + '</div>' +
      '<div class="product-footer">' +
      '<div class="product-price">ab ' + p.priceFrom.toFixed(2).replace('.', ',') + ' \u20ac<small>inkl. MwSt., zzgl. Versand</small></div>' +
      '<a href="' + url + '" target="_blank" class="product-cta">Zum Produkt' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>' +
      '</div></div></div>';
  }).join('');
}

// ==================================================================
// INIT
// ==================================================================
show();
window.wk_reset = reset;
window.wk_back = back;
window.wk_next = next;
window.wk_pickOpt = pickOpt;
window.wk_goToStep = goToStep;
})();
</script>
</body></html>
