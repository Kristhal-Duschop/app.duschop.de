    <title>Wintergarten-Dichtung finden | duschop.de</title>
    <meta name="description" content="Die passende Dichtung f&uuml;r Ihren Wintergarten oder Sommergarten aus Polycarbonat, UV-best&auml;ndig, hochtransparent.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>WINTERGARTEN-DICHTUNG</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.WintergartenData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'wintergarten-konfigurator',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('wintergarten-dichtung', D.products); },

            hero: {
                badge: 'In 2 Schritten zur richtigen Dichtung',
                title: 'Wintergarten-Dichtung finden',
                desc: 'UV-beständige Polycarbonat-Dichtungen für Winter- und Sommergärten, gegen Zugluft, Regen und Insekten zwischen den Glasscheiben.'
            },

            steps: [
                {
                    key: 'type',
                    shortLabel: 'Verbindung',
                    question: 'Welche Verbindungsart?',
                    hint: 'Stehen die Glasscheiben überlappend (90°) oder fluchtend in einer Linie (180°)?',
                    options: [
                        { value: 90,  label: '90° Überlappung', desc: 'Die eine Glasscheibe überlappt die andere, typisch bei Schiebeelementen.', icon: '┐', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 180, label: '180° Fluchtend',  desc: 'Beide Glasscheiben stoßen in einer Linie aufeinander, Glas-Glas-Fuge.',     icon: '━━' }
                    ],
                    tip: { icon: '💡', type: 'info', text: '<strong>Tipp:</strong> Bei Schiebeelementen ist fast immer <strong>90° Überlappung</strong> richtig. Festverglaste Felder ohne Beweglichkeit haben oft <strong>180° Fluchtend</strong>.' }
                },
                {
                    key: 'glass',
                    shortLabel: 'Glasdicke',
                    crossTool: true,
                    question: 'Welche Glasdicke?',
                    hint: 'Messen Sie die Dicke des Glases bzw. der Polycarbonatplatte an einer Kante.',
                    options: [
                        { value: 6,  label: '6 mm', desc: 'Häufig bei Sommergarten-Verglasung.', icon: '◻️', badge: { type: 'standard', text: 'Standard' } },
                        { value: 8,  label: '8 mm', desc: 'Häufig bei Wintergarten mit ESG.', icon: '⬜', badge: { type: 'standard', text: 'Standard' } },
                        { value: 10, label: '10 mm', desc: 'Mittel-robuste Verglasung.', icon: '🔲' },
                        { value: 12, label: '12 mm', desc: 'Sehr robust, selten.', icon: '⏹️' }
                    ],
                    tip: { icon: '☀️', type: 'info', text: '<strong>UV-Beständigkeit:</strong> Alle hier gelisteten Dichtungen sind aus <em>Polycarbonat</em> und für Außenanwendung freigegeben, sie halten 10+ Jahre Sonne ohne zu verspröden.' }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, allProducts);
                matched.sort(function (a, b) {
                    if (a.bestseller && !b.bestseller) return -1;
                    if (!a.bestseller && b.bestseller) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.bestseller) badges.push({ type: 'perfect', text: 'Bestseller' });
                    badges.push({ type: 'match', text: p.type + '°' });
                    badges.push({ type: 'match', text: 'Glas ' + state.glass + ' mm' });
                    if (p.lipWidths) badges.push({ text: 'Lippe: ' + p.lipWidths });
                    return {
                        product: {
                            title: p.name + (p.artNr ? ' · Art.Nr. ' + p.artNr : ''),
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (p.image ? [{ src: p.image }] : []),
                            variants: [{ price: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zu einer Wintergarten-Dichtung.'
            }
        });
    })();
    </script>
