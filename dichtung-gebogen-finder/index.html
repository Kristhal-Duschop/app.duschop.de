<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gebogene Duschdichtung finden | duschop.de</title>
    <meta name="description" content="Die passende gebogene Bodendichtung f&uuml;r Viertelkreis- oder F&uuml;nfeck-Duschen mit Rundglas finden &mdash; mit Glasdicke, Form und Spaltma&szlig;.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>DICHTUNG GEBOGEN</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.DichtungGebogenData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'dichtung-gebogen-finder',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('runde-gebogene-duschturdichtungen', D.products); },

            hero: {
                badge: 'In 3 Schritten zur passenden Rundglas-Dichtung',
                title: 'Gebogene Bodendichtung finden',
                desc: 'Für Viertelkreis- oder Fünfeck-Duschen mit gebogenem Rundglas — spezielle Profile mit passender Krümmung.'
            },

            steps: [
                {
                    key: 'glass',
                    shortLabel: 'Glasdicke',
                    crossTool: true,
                    question: 'Welche Glasdicke hat Ihre Dusche?',
                    hint: 'Messen Sie die Dicke an einer Glaskante.',
                    options: [
                        { value: 4, label: '4 mm', desc: 'Sehr selten.', icon: '▫️' },
                        { value: 5, label: '5 mm', desc: 'Selten.', icon: '▫️' },
                        { value: 6, label: '6 mm', desc: 'Häufig bei Rundglasduschen.', icon: '◻️', badge: { type: 'standard', text: 'Standard' } },
                        { value: 8, label: '8 mm', desc: 'Häufig bei rahmenlosen Rundglasduschen.', icon: '⬜', badge: { type: 'standard', text: 'Standard' } }
                    ],
                    tip: { icon: '💡', type: 'info', text: '<strong>Tipp:</strong> Die meisten Rundglasduschen haben <strong>6 mm</strong> oder <strong>8 mm</strong> Glas. Messen Sie exakt mit einem Messschieber.' }
                },
                {
                    key: 'form',
                    shortLabel: 'Duschform',
                    question: 'Welche Duschform haben Sie?',
                    hint: 'Wählen Sie die Form Ihrer Rundglasdusche.',
                    options: [
                        { value: 'viertelkreis', label: 'Viertelkreis / Halbkreis', desc: 'Runde Standarddusche mit gebogenem Glas.', icon: '◠', badge: { type: 'standard', text: 'Am häufigsten' } },
                        { value: 'fuenfeck',      label: 'Fünfeck',                 desc: 'Fünfeckdusche mit zwei abgewinkelten Glasscheiben.', icon: '⬠' }
                    ]
                },
                {
                    key: 'gap',
                    shortLabel: 'Spaltmaß',
                    type: 'slider',
                    question: 'Wie groß ist der Spalt zum Boden?',
                    hint: 'Messen Sie zwischen der Unterkante des gebogenen Glases und dem Boden oder der Duschwanne.',
                    min: 2,
                    max: 25,
                    step: 1,
                    default: 12,
                    unit: 'mm',
                    sliderLabel: 'Spaltmaß zwischen Glas und Boden',
                    quickPicks: [6, 8, 10, 12, 15, 18, 20],
                    tip: { icon: '📏', type: 'warning', text: '<strong>Wichtig:</strong> Messen Sie an der <em>weitesten Stelle</em>. Wenn ein <em>Schwallprofil</em> verbaut ist, messen Sie vom höchsten Punkt — und addieren 1–2 mm zum reinen Spalt (Dichtlippe sollte leicht überlappen).' }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, undefined, allProducts);
                matched.sort(function (a, b) {
                    if (a.bestseller && !b.bestseller) return -1;
                    if (!a.bestseller && b.bestseller) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.bestseller) badges.push({ type: 'perfect', text: 'Bestseller' });
                    badges.push({ type: 'match', text: 'Glas ' + state.glass + ' mm' });
                    if (p.gapMin != null && p.gapMax != null) badges.push({ text: p.gapMin + '–' + p.gapMax + ' mm Spalt' });
                    return {
                        product: {
                            title: p.name + (p.artNr ? ' · Art.Nr. ' + p.artNr : ''),
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (p.image ? [{ src: p.image }] : []),
                            variants: [{ price: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zu einer gebogenen Duschdichtung.'
            }
        });
    })();
    </script>

        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

</body>
</html>
