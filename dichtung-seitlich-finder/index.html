<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Seitliche Duschdichtung finden | duschop.de</title>
    <meta name="description" content="Die passende seitliche Duschdichtung finden, mit Glasdicke, Anwendung (Glas-Glas / Glas-Wand), T&uuml;rtyp, Anordnung und Spaltma&szlig;.">
    <link rel="stylesheet" href="../assets/duschop.css">
    <style>html, body { margin: 0; padding: 0; } body { background: var(--duschop-bg, #f8f6f3); }</style>
</head>
<body>

    <div class="duschop-app" style="background:transparent;">
        <header class="duschop-header">
            <div class="duschop-header-inner">
                <a href="../" class="duschop-back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Alle Berater
                </a>
                <div class="duschop-tool-title">DUSCHOP <span>DICHTUNG SEITLICH</span></div>
                <a href="https://duschop.de" class="duschop-header-link">&rarr; zum Shop</a>
            </div>
        </header>
    </div>

    <div id="duschop-app"></div>

    <script src="data.js"></script>
    <script src="../assets/duschop.js"></script>
    <script>
    (function () {
        var D = window.DichtungSeitlichData;

        new DuschopWizard({
            mount: '#duschop-app',
            toolSlug: 'dichtung-seitlich-finder',
            fetchProducts: function () { return DuschopShopifyClient.fetchCollectionMerged('duschdichtungen_seitlich', D.products); },

            hero: {
                badge: 'In 5 Schritten zur passenden Dichtung',
                title: 'Seitliche Duschdichtung finden',
                desc: 'Mitteldichtung, Ballondichtung, Lippendichtung, wir zeigen Ihnen, welches Profil zu Ihrer Glasdicke, Anordnung und Spaltmaß passt.'
            },

            steps: [
                {
                    key: 'glass',
                    shortLabel: 'Glasdicke',
                    crossTool: true,
                    question: 'Welche Glasdicke hat Ihre Dusche?',
                    hint: 'Messen Sie die Dicke des Glases an einer Kante.',
                    options: [
                        { value: 6,  label: '6 mm', desc: 'Häufig bei Standardduschen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8956c" stroke-width="1.5" stroke-linecap="round"><line x1="20" y1="6" x2="28" y2="6"/><line x1="20" y1="4" x2="20" y2="8"/><line x1="28" y1="4" x2="28" y2="8"/></g><rect x="20" y="11" width="8" height="30" rx="1" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>', badge: { type: 'standard', text: 'Standard' } },
                        { value: 8,  label: '8 mm', desc: 'Häufig bei rahmenlosen Duschen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8956c" stroke-width="1.5" stroke-linecap="round"><line x1="18.5" y1="6" x2="29.5" y2="6"/><line x1="18.5" y1="4" x2="18.5" y2="8"/><line x1="29.5" y1="4" x2="29.5" y2="8"/></g><rect x="18.5" y="11" width="11" height="30" rx="1" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>', badge: { type: 'standard', text: 'Standard' } },
                        { value: 10, label: '10 mm', desc: 'Seltener, bei besonders robusten Modellen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8956c" stroke-width="1.5" stroke-linecap="round"><line x1="17" y1="6" x2="31" y2="6"/><line x1="17" y1="4" x2="17" y2="8"/><line x1="31" y1="4" x2="31" y2="8"/></g><rect x="17" y="11" width="14" height="30" rx="1" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>' }
                    ],
                    tip: { icon: '💡', type: 'info', text: '<strong>Tipp:</strong> Die gängigsten Glasdicken sind <strong>6 mm</strong> und <strong>8 mm</strong>. Messen Sie exakt, die Dichtung muss auf den Zehntelmillimeter passen.' }
                },
                {
                    key: 'application',
                    shortLabel: 'Anwendung',
                    question: 'Wo wird die Dichtung eingesetzt?',
                    hint: 'Zwischen zwei Glasscheiben oder zwischen Glas und Wand?',
                    options: [
                        { value: 'glas-glas', label: 'Glas zu Glas', desc: 'Mitteldichtung zwischen zwei Glasscheiben (z.B. Tür an Festteil).', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="14" width="9" height="20" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="31" y="14" width="9" height="20" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="20" y="15" width="8" height="18" rx="4" fill="#c8956c" stroke="#a87a52" stroke-width="0.8"/></svg>' },
                        { value: 'glas-wand', label: 'Glas zu Wand', desc: 'Wandanschlussdichtung zwischen Glasscheibe und Wand.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="11" width="8" height="26" rx="1" fill="#1a1a2e"/><rect x="31" y="14" width="9" height="20" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="20" y="15" width="8" height="18" rx="4" fill="#c8956c" stroke="#a87a52" stroke-width="0.8"/></svg>' }
                    ]
                },
                {
                    key: 'door',
                    shortLabel: 'Türtyp',
                    question: 'Welchen Türtyp haben Sie?',
                    hint: 'Wie öffnet sich Ihre Duschtür?',
                    options: [
                        { value: 'dreh',    label: 'Drehtür',    desc: 'Tür schwingt in eine Richtung auf.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="11" width="4" height="28" rx="1" fill="#1a1a2e"/><rect x="12" y="12.5" width="23" height="5" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1" transform="rotate(34 13 15)"/><path d="M35 16 A22 22 0 0 1 19 36" fill="none" stroke="#c8956c" stroke-width="1.4" stroke-dasharray="2.5 2.5" stroke-linecap="round"/></svg>', badge: { type: 'standard', text: 'Häufig' } },
                        { value: 'pendel',  label: 'Pendeltür',  desc: 'Tür schwingt nach innen UND außen.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="22" y="9" width="4" height="6" rx="1" fill="#1a1a2e"/><rect x="21.5" y="15" width="5" height="24" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><path d="M14 19 A12 12 0 0 0 14 35" fill="none" stroke="#c8956c" stroke-width="1.4" stroke-dasharray="2.5 2.5" stroke-linecap="round"/><path d="M34 19 A12 12 0 0 1 34 35" fill="none" stroke="#c8956c" stroke-width="1.4" stroke-dasharray="2.5 2.5" stroke-linecap="round"/></svg>' },
                        { value: 'schiebe', label: 'Schiebetür', desc: 'Tür gleitet seitlich auf einer Schiene.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="17" width="26" height="5" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="15" y="24" width="26" height="5" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><g stroke="#c8956c" stroke-width="1.6" stroke-linecap="round" fill="none"><line x1="18" y1="37" x2="33" y2="37"/><path d="M29 34 L33 37 L29 40"/></g></svg>' }
                    ]
                },
                {
                    key: 'arrangement',
                    shortLabel: 'Anordnung',
                    question: 'Wie stehen die Glasscheiben zueinander?',
                    hint: 'Fluchtend (in einer Linie) oder überlappend (versetzt)?',
                    options: [
                        { value: 'fluchtend',    label: 'Fluchtend (180°)',    desc: 'Glasscheiben in einer Linie.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="21" width="15" height="6" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="26" y="21" width="15" height="6" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="22" y="20" width="4" height="8" rx="1" fill="#c8956c" stroke="#a87a52" stroke-width="0.7"/></svg>' },
                        { value: 'ueberlappend', label: 'Überlappend',          desc: 'Glasscheiben versetzt, Tür überlappt Festteil.', icon: '<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="19" width="22" height="6" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/><rect x="19" y="24" width="22" height="6" rx="1.5" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.1"/></svg>' }
                    ]
                },
                {
                    key: 'gap',
                    shortLabel: 'Spaltmaß',
                    type: 'slider',
                    question: 'Wie groß ist der Spalt?',
                    hint: 'Messen Sie den Abstand zwischen den Glaskanten mit einem Lineal oder Messschieber.',
                    illustration:
                        '<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spaltmaß zwischen zwei Glaskanten messen">' +
                        '<rect x="92" y="16" width="24" height="80" rx="2" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.2"/><line x1="98" y1="21" x2="98" y2="91" stroke="#f2f7fb" stroke-width="1.6"/>' +
                        '<rect x="184" y="16" width="24" height="80" rx="2" fill="#d8e3ee" stroke="#8ba3bb" stroke-width="1.2"/><line x1="190" y1="21" x2="190" y2="91" stroke="#f2f7fb" stroke-width="1.6"/>' +
                        '<line x1="116" y1="40" x2="116" y2="66" stroke="#b8b2a8" stroke-width="0.8"/><line x1="184" y1="40" x2="184" y2="66" stroke="#b8b2a8" stroke-width="0.8"/>' +
                        '<line x1="116" y1="58" x2="184" y2="58" stroke="#c8956c" stroke-width="2"/>' +
                        '<path d="M116 58 L121 55 L121 61 Z" fill="#a87a52"/><path d="M184 58 L179 55 L179 61 Z" fill="#a87a52"/>' +
                        '<text x="150" y="49" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#a87a52">Spaltmaß</text>' +
                        '<text x="104" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9a9a9a">Glas</text>' +
                        '<text x="196" y="112" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9a9a9a">Glas</text>' +
                        '</svg>',
                    min: 0,
                    max: 30,
                    step: 1,
                    default: 10,
                    unit: 'mm',
                    sliderLabel: 'Spaltmaß zwischen den Glaskanten',
                    quickPicks: [5, 8, 10, 12, 15, 20],
                    tip: { icon: '📏', type: 'warning', text: '<strong>Wichtig:</strong> Messen Sie an der <em>breitesten Stelle</em> des Spalts. Die Dichtung muss überall passen, auch wenn der Spalt nicht ganz gleichmäßig ist.' }
                }
            ],

            match: function (state, allProducts) {
                var matched = D.filterProducts(state, undefined, allProducts);
                matched.sort(function (a, b) {
                    if (a.bestseller && !b.bestseller) return -1;
                    if (!a.bestseller && b.bestseller) return 1;
                    return 0;
                });
                return matched.map(function (p, idx) {
                    var badges = [];
                    if (p.bestseller) badges.push({ type: 'perfect', text: 'Bestseller' });
                    if (p.sortType) badges.push({ text: p.sortType.charAt(0).toUpperCase() + p.sortType.slice(1) + 'dichtung' });
                    badges.push({ type: 'match', text: 'Glas ' + state.glass + ' mm' });
                    return {
                        product: {
                            title: p.name + (p.artNr ? ' · Art.Nr. ' + p.artNr : ''),
                            handle: p.handle,
                            images: (p.images && p.images.length) ? p.images : (p.image ? [{ src: p.image }] : []),
                            variants: [{ price: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null }]
                        },
                        matchReason: p.desc,
                        badges: badges,
                        priceOverride: p.priceFrom ? p.priceFrom.toFixed(2).replace('.', ',') : null,
                        position: idx
                    };
                });
            },

            conversion: {
                whatsappText: 'Hallo, ich brauche eine kurze Beratung zu einer seitlichen Duschdichtung.'
            }
        });
    })();
    </script>

        <span class="duschop-wa-sticky-text">Beratung per WhatsApp</span>
    </a>

</body>
